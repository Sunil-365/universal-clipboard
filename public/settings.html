<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .settings-wrapper { width: 100%; max-width: 800px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }
        .settings-header { margin-bottom: 30px; }
        .settings-header h1 { font-weight: 800; font-size: 2.2rem; color: var(--text-primary); margin-bottom: 8px; }
        .settings-header p { color: var(--text-secondary); font-size: 1rem; }
        
        .settings-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .settings-tabs { display: flex; border-bottom: 1px solid var(--card-border); background: var(--bg-color); }
        .tab-btn { flex: 1; padding: 16px; text-align: center; background: none; border: none; border-bottom: 2px solid transparent; font-weight: 600; font-size: 0.95rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background: var(--card-bg); }
        
        .tab-content { padding: 30px; display: none; }
        .tab-content.active { display: block; }
        
        .info-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--card-border); }
        .info-group:last-child { border-bottom: none; }
        .info-label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .info-value { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .badge-trial { background: rgba(79, 70, 229, 0.15); color: var(--accent-primary); }
        .badge-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-none { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        input { width: 100%; padding: 12px 15px; font-size: 0.95rem; background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; font-family: inherit; outline: none; }
        input:focus { border-color: var(--accent-primary); }
        .btn { padding: 12px 20px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
        .btn:hover { background: #4338ca; }
        
        .msg { font-size: 0.9rem; margin-top: 15px; font-weight: 500; }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="settings-wrapper">
        <div class="settings-header">
            <h1>Account Settings</h1>
            <p>Manage your profile, active subscription, and security.</p>
        </div>

        <div id="status-alert" style="display: none; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; font-weight: 500; background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success);"></div>

        <div class="settings-card">
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="switchTab('sub')">Subscription</button>
                <button class="tab-btn" onclick="switchTab('profile')">Profile</button>
                <button class="tab-btn" onclick="switchTab('security')">Security</button>
            </div>

            <!-- Subscription Tab -->
            <div id="tab-sub" class="tab-content active">
                <div class="info-group">
                    <div class="info-label">Current Status</div>
                    <div class="info-value" id="sub-status"><span class="badge badge-none">Free Tier</span></div>
                </div>
                <div class="info-group" id="plan-group" style="display: none;">
                    <div class="info-label">Plan</div>
                    <div class="info-value" id="sub-plan">-</div>
                </div>
                <div class="info-group" id="trial-group" style="display: none;">
                    <div class="info-label">7-Day Free Trial Ends</div>
                    <div class="info-value" id="trial-date">-</div>
                </div>
                <div class="info-group" id="ends-group" style="display: none;">
                    <div class="info-label">Next Billing Date</div>
                    <div class="info-value" id="sub-date">-</div>
                </div>
                <div style="margin-top: 25px;">
                    <a href="pricing.html" class="btn" style="text-decoration: none; display: inline-block;">Upgrade Plan</a>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content">
                <div class="info-group">
                    <div class="info-label">Email Address</div>
                    <div class="info-value" id="user-email">Loading...</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Authentication Method</div>
                    <div class="info-value" id="user-auth">-</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Member Since</div>
                    <div class="info-value" id="user-joined">-</div>
                </div>
            </div>

            <!-- Security Tab -->
            <div id="tab-security" class="tab-content">
                <form id="password-form">
                    <div class="input-group">
                        <label>Current Password</label>
                        <input type="password" id="current-password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn" id="pass-btn">Update Password</button>
                    <div id="pass-msg" class="msg"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        async function loadProfile() {
            try {
                // Check if returning from Cashfree payment
                const urlParams = new URLSearchParams(window.location.search);
                const orderId = urlParams.get('order_id');
                const plan = urlParams.get('plan');

                if (orderId) {
                    const verifyRes = await fetch('/api/payment/verify', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ order_id: orderId, plan: plan })
                    });
                    const verifyData = await verifyRes.json();
                    if (verifyRes.ok) {
                        const alertBox = document.getElementById('status-alert');
                        alertBox.innerText = "🎉 Payment verified! Your 7-Day Free Trial is now active.";
                        alertBox.style.display = 'block';
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }

                const res = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await res.json();

                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-auth').innerText = user.authProvider === 'google' ? 'Google Sign-In' : 'Email & Password';
                document.getElementById('user-joined').innerText = new Date(user.createdAt).toLocaleDateString();

                if (user.authProvider === 'google') {
                    document.getElementById('password-form').innerHTML = '<p style="color: var(--text-secondary);">Your account is managed via Google Sign-In. Password reset is not applicable.</p>';
                }

                const statusEl = document.getElementById('sub-status');
                if (user.isPremium) {
                    if (user.subscriptionStatus === 'trial') {
                        statusEl.innerHTML = '<span class="badge badge-trial">7-Day Free Trial Active</span>';
                        if (user.trialEndsAt) {
                            document.getElementById('trial-group').style.display = 'block';
                            document.getElementById('trial-date').innerText = new Date(user.trialEndsAt).toLocaleDateString();
                        }
                    } else {
                        statusEl.innerHTML = '<span class="badge badge-active">Active Subscriber</span>';
                    }
                    if (user.subscriptionPlan) {
                        document.getElementById('plan-group').style.display = 'block';
                        document.getElementById('sub-plan').innerText = user.subscriptionPlan.toUpperCase();
                    }
                } else {
                    statusEl.innerHTML = '<span class="badge badge-none">Free Tier</span>';
                }
            } catch (e) {
                console.error("Failed to load profile", e);
            }
        }

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('pass-btn');
            const msg = document.getElementById('pass-msg');
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;

            btn.disabled = true;
            msg.innerText = '';
            
            try {
                const res = await fetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to change password');

                msg.className = 'msg success';
                msg.innerText = data.message;
                document.getElementById('password-form').reset();
            } catch (err) {
                msg.className = 'msg error';
                msg.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        });

        loadProfile();
    </script>
</body>
</html>
