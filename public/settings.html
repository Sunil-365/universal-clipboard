<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Account Settings - DropConnect</title>
    <meta name="description" content="Manage your DropConnect account settings, profile, and security.">
    <meta name="keywords" content="DropConnect settings, account profile">
    <link rel="canonical" href="https://dropconnect.up.railway.app/settings">
    <meta property="og:title" content="Account Settings - DropConnect">
    <meta property="og:description" content="Manage your DropConnect account settings, profile, and security.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/settings">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Account Settings - DropConnect">
    <meta name="twitter:description" content="Manage your DropConnect account settings, profile, and security.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .settings-wrapper { 
            width: 100%; 
            max-width: 800px; 
            margin: 20px auto 40px auto; 
            padding: 0 20px; 
        }
        .settings-header { 
            margin-bottom: 28px; 
        }
        .settings-header h1 { 
            font-weight: 800; 
            font-size: 2.2rem; 
            color: var(--text-primary); 
            margin-bottom: 8px; 
            letter-spacing: -0.8px;
        }
        .settings-header p { 
            color: var(--text-secondary); 
            font-size: 1rem; 
            margin: 0;
        }
        
        .settings-card { 
            background: var(--card-bg); 
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-xl); 
            box-shadow: var(--shadow-glass); 
            overflow: hidden; 
        }
        .settings-tabs { 
            display: flex; 
            border-bottom: 1px solid var(--card-border); 
            background: var(--bg-surface); 
        }
        .tab-btn { 
            flex: 1; 
            padding: 16px; 
            text-align: center; 
            background: none; 
            border: none; 
            border-bottom: 2px solid transparent; 
            font-weight: 600; 
            font-size: 0.95rem; 
            color: var(--text-secondary); 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .tab-btn:hover { 
            color: var(--text-primary); 
        }
        .tab-btn.active { 
            color: var(--accent-primary); 
            border-bottom-color: var(--accent-primary); 
            background: var(--card-bg); 
        }
        
        .tab-content { 
            padding: 32px; 
            display: none; 
        }
        .tab-content.active { 
            display: block; 
        }
        
        .info-group { 
            margin-bottom: 20px; 
            padding-bottom: 16px; 
            border-bottom: 1px solid var(--card-border); 
        }
        .info-group:last-child { border-bottom: none; }
        .info-label { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 6px; 
        }
        .info-value { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: var(--text-primary); 
        }
        
        .msg { 
            font-size: 0.9rem; 
            margin-top: 16px; 
            font-weight: 600; 
        }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="settings-wrapper">
        <div class="settings-header">
            <h1>Account Settings</h1>
            <p>Manage your profile, authentication, and security preferences.</p>
        </div>

        <div id="status-alert" style="display: none; padding: 16px 20px; border-radius: var(--radius-md); margin-bottom: 20px; font-weight: 600; background: var(--success-bg); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3);"></div>

        <div class="settings-card">
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'profile')">Profile</button>
                <button class="tab-btn" onclick="switchTab(event, 'security')">Security</button>
            </div>

            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content active">
                <div class="info-group">
                    <div class="info-label">Email Address</div>
                    <div class="info-value" id="user-email">Loading...</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Authentication Method</div>
                    <div class="info-value" id="user-auth">-</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Member Since</div>
                    <div class="info-value" id="user-joined">-</div>
                </div>
                <form id="profile-form" style="margin-top: 24px;">
                    <div class="input-group">
                        <label>Phone Number (Optional)</label>
                        <input type="tel" id="user-phone-input" placeholder="e.g. +1 555-0199">
                    </div>
                    <button type="submit" class="btn" id="profile-btn" style="width: auto;">Save Profile</button>
                    <div id="profile-msg" class="msg"></div>
                </form>
            </div>

            <!-- Security Tab -->
            <div id="tab-security" class="tab-content">
                <form id="password-form">
                    <div class="input-group">
                        <label>Current Password</label>
                        <input type="password" id="current-password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn" id="pass-btn" style="width: auto;">Update Password</button>
                    <div id="pass-msg" class="msg"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        if (typeof supabaseClient === 'undefined') {
            alert("Supabase is not configured.");
            window.location.href = '/login';
        }

        async function checkAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    window.location.href = '/login';
                } else {
                    loadProfile(user);
                }
            } catch (e) {
                window.location.href = '/login';
            }
        }
        checkAuth();

        function switchTab(evt, tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (evt && evt.target) {
                evt.target.classList.add('active');
            }
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        async function loadProfile(user) {
            try {
                document.getElementById('user-email').innerText = user.email;
                
                const phone = user.user_metadata?.phone || '';
                document.getElementById('user-phone-input').value = phone;
                
                const provider = user.app_metadata?.provider || 'email';
                document.getElementById('user-auth').innerText = provider === 'google' ? 'Google Sign-In' : 'Email & Password';
                document.getElementById('user-joined').innerText = new Date(user.created_at).toLocaleDateString();

                if (provider === 'google') {
                    document.getElementById('password-form').innerHTML = '<p style="color: var(--text-secondary);">Your account is managed via Google Sign-In. Password reset is not applicable.</p>';
                }
            } catch (e) {
                console.error("Failed to load profile", e);
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('profile-btn');
            const msg = document.getElementById('profile-msg');
            const phone = document.getElementById('user-phone-input').value.trim();

            btn.disabled = true;
            msg.innerText = '';
            
            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    data: { phone: phone }
                });
                
                if (error) throw error;

                msg.className = 'msg success';
                msg.innerText = "Profile updated successfully!";
                if (typeof window.showToast === 'function') {
                    window.showToast("Profile updated successfully!", "success");
                }
            } catch (err) {
                msg.className = 'msg error';
                msg.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        });

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('pass-btn');
            const msg = document.getElementById('pass-msg');
            const newPassword = document.getElementById('new-password').value;

            btn.disabled = true;
            msg.innerText = '';
            
            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;

                msg.className = 'msg success';
                msg.innerText = "Password updated successfully!";
                if (typeof window.showToast === 'function') {
                    window.showToast("Password updated successfully!", "success");
                }
                document.getElementById('password-form').reset();
            } catch (err) {
                msg.className = 'msg error';
                msg.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
