<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #4f46e5;
            --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-primary); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; justify-content: center; }
        .auth-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-weight: 800; font-size: 2rem; margin-top: 0; margin-bottom: 25px; text-align: center; color: var(--accent-primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        input { width: 100%; padding: 12px 15px; font-size: 1rem; background: #f8fafc; border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; transition: border-color 0.2s; font-family: inherit; }
        input:focus { outline: none; border-color: var(--accent-primary); }
        .btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; background: var(--accent-primary); color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 15px; }
        .btn:hover { background: #4338ca; }
        .error-msg { color: var(--danger); font-size: 0.9rem; text-align: center; margin-bottom: 15px; min-height: 20px; }
        .toggle-mode { text-align: center; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; }
        .toggle-mode span { color: var(--accent-primary); font-weight: 600; }
        .back { margin-top: 30px; display: inline-block; color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="form-title">Welcome Back</h1>
        <div class="error-msg" id="error-msg"></div>
        
        <div id="g_id_onload"
             data-client_id="18426025024-722mlcucv7tl8s28sue7dmc9djibkqht.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="continue_with"
             data-size="large"
             data-logo_alignment="left"
             style="display: flex; justify-content: center; margin-bottom: 20px;">
        </div>
        <div style="text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem;">
            or
        </div>

        <form id="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submit-btn">Log In</button>
        </form>
        <div class="toggle-mode" id="toggle-mode">Don't have an account? <span>Sign Up</span></div>
    </div>
    <a href="index.html" class="back">← Back to Home</a>

    <script>
        async function handleGoogleResponse(response) {
            const errorMsg = document.getElementById('error-msg');
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    errorMsg.innerText = data.error || "Google Auth failed.";
                } else {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'premium.html';
                }
            } catch (err) {
                errorMsg.innerText = "Network error during Google Sign-In.";
            }
        }

        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');
        const errorMsg = document.getElementById('error-msg');
        const form = document.getElementById('auth-form');

        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.innerText = "Welcome Back";
                submitBtn.innerText = "Log In";
                toggleMode.innerHTML = "Don't have an account? <span>Sign Up</span>";
            } else {
                formTitle.innerText = "Create Account";
                submitBtn.innerText = "Sign Up";
                toggleMode.innerHTML = "Already have an account? <span>Log In</span>";
            }
            errorMsg.innerText = "";
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMsg.innerText = "";
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            const endpoint = isLogin ? '/api/login' : '/api/register';
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    errorMsg.innerText = data.error || "Authentication failed.";
                } else {
                    localStorage.setItem('token', data.token);
                    // For demo: Automatically subscribe them when they login/register if they aren't premium
                    if (!data.user.isPremium) {
                        const subRes = await fetch('/api/subscribe', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${data.token}` }
                        });
                        const subData = await subRes.json();
                        if (subData.token) localStorage.setItem('token', subData.token);
                    }
                    window.location.href = 'premium.html';
                }
            } catch (err) {
                errorMsg.innerText = "Network error. Please try again.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? "Log In" : "Sign Up";
            }
        });
    </script>
</body>
</html>
