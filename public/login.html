<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Login / Register - DropConnect</title>
    <meta name="description" content="Log in or register to DropConnect to start syncing your clipboard and files across all your devices instantly.">
    <meta name="keywords" content="DropConnect login, register, sign up, secure file sync">
    <link rel="canonical" href="https://dropconnect.up.railway.app/login">
    <meta property="og:title" content="Login / Register - DropConnect">
    <meta property="og:description" content="Log in or register to DropConnect to start syncing your clipboard and files across all your devices instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/login">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Login / Register - DropConnect">
    <meta name="twitter:description" content="Log in or register to DropConnect to start syncing your clipboard and files across all your devices instantly.">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .auth-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; width: 100%; box-sizing: border-box; }
        .auth-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-sm); }
        h1 { font-weight: 800; font-size: 2rem; margin-top: 0; margin-bottom: 25px; text-align: center; color: var(--text-primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        input { width: 100%; padding: 14px 15px; font-size: 1rem; background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; transition: border-color 0.2s; font-family: inherit; }
        input:focus { outline: none; border-color: var(--accent-primary); }
        .error-msg { color: var(--danger); font-size: 0.9rem; text-align: center; margin-bottom: 15px; min-height: 20px; font-weight: 500; }
        .toggle-mode { text-align: center; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; margin-top: 20px; }
        .toggle-mode span { color: var(--accent-primary); font-weight: 600; }
        
        .divider { display: flex; align-items: center; margin: 25px 0; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--card-border); }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <div class="auth-wrapper">
        <div class="auth-container">
            <h1 id="form-title">Welcome Back</h1>
            <div class="error-msg" id="error-msg"></div>
            
            <div id="g_id_onload"
                 data-client_id="18426025024-722mlcucv7tl8s28sue7dmc9djibkqht.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="redirect"
                 data-login_uri="/api/auth/google"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="continue_with"
                 data-size="large"
                 data-logo_alignment="left"
                 style="display: flex; justify-content: center;">
            </div>
            
            <div class="divider">or</div>
    
            <form id="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" id="submit-btn" style="width: 100%;">Log In</button>
            </form>
            <div class="toggle-mode" id="toggle-mode">Don't have an account? <span>Sign Up</span></div>
        </div>
    </div>

    <script>
        async function handleGoogleResponse(response) {
            const errorMsg = document.getElementById('error-msg');
            try {
                if (typeof supabaseClient === 'undefined') {
                    errorMsg.innerText = "Supabase not configured.";
                    return;
                }
                const { data, error } = await supabaseClient.auth.signInWithIdToken({
                    provider: 'google',
                    token: response.credential
                });
                
                if (error) {
                    errorMsg.innerText = error.message;
                } else {
                    const redirect = sessionStorage.getItem('redirectAfterLogin');
                    if (redirect) {
                        sessionStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirect;
                    } else {
                        window.location.href = 'premium';
                    }
                }
            } catch (err) {
                errorMsg.innerText = "Google Sign-In failed.";
            }
        }

        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');
        const errorMsg = document.getElementById('error-msg');
        const form = document.getElementById('auth-form');

        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.innerText = "Welcome Back";
                submitBtn.innerText = "Log In";
                toggleMode.innerHTML = "Don't have an account? <span>Sign Up</span>";
            } else {
                formTitle.innerText = "Create Account";
                submitBtn.innerText = "Sign Up";
                toggleMode.innerHTML = "Already have an account? <span>Log In</span>";
            }
            errorMsg.innerText = "";
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMsg.innerText = "";
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            if (typeof supabaseClient === 'undefined') {
                errorMsg.innerText = "Supabase not configured.";
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? "Log In" : "Sign Up";
                return;
            }

            try {
                let result;
                if (isLogin) {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabaseClient.auth.signUp({ email, password });
                }
                
                const { data, error } = result;
                if (error) {
                    errorMsg.innerText = error.message;
                } else {
                    if (!isLogin && !data.session) {
                        alert("Sign up successful! Please check your email for verification link.");
                        window.location.href = 'login';
                    } else {
                        const redirect = sessionStorage.getItem('redirectAfterLogin');
                        if (redirect) {
                            sessionStorage.removeItem('redirectAfterLogin');
                            window.location.href = redirect;
                        } else {
                            window.location.href = 'premium';
                        }
                    }
                }
            } catch (err) {
                errorMsg.innerText = "Authentication error. Please try again.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? "Log In" : "Sign Up";
            }
        });
    </script>
</body>
</html>
