<html lang="en">

    <meta property="og:url" content="https://dropconnect.up.railway.app/sender">

    <meta name="twitter:description" content="Quickly send files, links, and text from your phone or device directly to your desktop using DropConnect.">

    <script src="supabase-config.js"></script>

    <script src="navbar.js"></script>
    <style>
        #reader { width: 100%; margin-top: 20px; border-radius: 8px; overflow: hidden; display: none; background-color: var(--card-bg); border: 1px solid var(--card-border); }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: transform 0.3s ease; box-shadow: var(--shadow-md); z-index: 100; white-space: nowrap; }
        .status-toast.show { transform: translateX(-50%) translateY(0); }
        .loader-small { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-left-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .card {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Large, round blue scan button */
        .btn-scan {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: var(--radius-lg);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .btn-scan:hover {
            background-color: var(--accent-hover);
        }
        .btn-scan:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>


    <div class="container" style="margin-top: 50px; padding: 0 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; box-sizing: border-box;">
        
        <!-- Logo Block 'D' -->
        <div style="display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: var(--accent-primary); border-radius: 16px; color: white; font-weight: 800; font-size: 2.2rem; margin: 0 auto 16px auto; box-shadow: var(--shadow-sm); user-select: none;">
            D
        </div>
        
        <h1 style="margin: 0; font-size: 1.85rem; font-weight: 800; color: var(--text-primary); text-align: center; letter-spacing: -0.5px;">Mobile Sender</h1>
        <p class="subtitle" style="margin-top: 6px; margin-bottom: 40px; color: var(--text-secondary); text-align: center; font-size: 1.05rem; font-weight: 500;">Secure Clipboard Transfer</p>

        <div class="card">
            <!-- Disconnected State (Scan QR) -->
            <div id="state-disconnected" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; margin-top: 0; margin-bottom: 30px; text-align: center; max-width: 270px; font-weight: 500;">
                    Tap below to scan the Desk Display QR code and connect.
                </p>
                
                <button class="btn-scan" id="startScanBtn">
                    📸 Scan QR Code
                </button>
                <button class="btn" id="stopScanBtn" style="background: var(--danger); display: none; margin-top: 15px;">
                    Stop Scanner
                </button>
                
                <div id="reader"></div>
            </div>

            <!-- Connected State (Enter and Send Text) -->
            <div id="state-connected" style="display: none; flex-direction: column; width: 100%;">
                <p style="color: var(--success); font-size: 0.9rem; margin-top: 0; margin-bottom: 20px; text-align: center; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Secure connection established.
                </p>
                
                <input type="text" id="msgInput" placeholder="Type a message or URL..." autocomplete="off" />
                <button class="btn" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Send Data
                </button>

                <div class="divider" style="margin: 24px 0;">or connect to another display</div>

                <button class="btn btn-outline" id="reScanBtn" style="font-size: 0.85rem; padding: 10px;" onclick="disconnectSession()">
                    Scan New Display QR
                </button>
            </div>
            
            <div id="premium-banner-section" style="display: none; width: 100%; margin-top: 25px;">
            </div>
        </div>
        
        <div class="ad-banner" style="margin-top: 40px; width: 100%; max-width: 420px; min-height: 50px; height: auto; background: var(--card-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.8rem; border: 1px solid var(--card-border); padding: 10px; box-sizing: border-box; text-align: center;">
            <div style="font-weight: 700; color: var(--accent-primary); font-size: 0.85rem;">🔒 Fully Encrypted Transfer</div>
            <div style="font-size: 0.75rem; color: var(--text-secondary);">End-to-End Encrypted using client-side AES.</div>
        </div>
    </div>
    
    <div id="toast" class="status-toast">Sent successfully!</div>
    
    <script>
        let socket;
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        const toast = document.getElementById('toast');
        
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let encryptionKey = '';
        let html5QrCode;

        if (window.location.hash.startsWith('#key=')) {
            encryptionKey = window.location.hash.substring(5);
        } else if (roomId) {
            // Missing key for Custom Room. Use the room ID as the encryption key
            encryptionKey = roomId;
        }
        
        const premiumSection = document.getElementById('premium-banner-section');
        
        async function checkAuthStatus() {
            if (typeof supabaseClient === 'undefined') return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.querySelectorAll('.ad-banner').forEach(el => el.style.display = 'none');
            } else {
                premiumSection.style.display = 'block';
                premiumSection.innerHTML = `
                    <div class="divider" style="margin: 10px 0;">Premium</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px; text-align: center;">Log in to unlock Auto-History & Ad-Free Experience!</div>
                    <button class="btn btn-outline" style="border-color: #f59e0b; color: #f59e0b;" onclick="window.location.href='login'">Log In to Unlock</button>
                `;
            }
        }
        checkAuthStatus();

        function updateUIState() {
            const disconnectedEl = document.getElementById('state-disconnected');
            const connectedEl = document.getElementById('state-connected');
            if (roomId) {
                disconnectedEl.style.display = 'none';
                connectedEl.style.display = 'flex';
            } else {
                disconnectedEl.style.display = 'flex';
                connectedEl.style.display = 'none';
            }
        }
        updateUIState();

        window.disconnectSession = function() {
            if (currentChannel) {
                currentChannel.unsubscribe();
                currentChannel = null;
            }
            roomId = '';
            encryptionKey = '';
            window.history.pushState({}, '', window.location.pathname);
            updateUIState();
        };

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function saveClipToDatabase(content) {
            if (typeof supabaseClient === 'undefined') return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                const { error } = await supabaseClient
                    .from('clips')
                    .insert([{ user_id: user.id, content: content }]);
                if (error) {
                    console.error("Failed to save clip to database:", error);
                } else {
                    console.log("Saved clip to database history.");
                }
            }
        }

        let currentChannel;

        function connectToRoomChannel(targetRoomId) {
            if (!targetRoomId) return;
            if (currentChannel) {
                currentChannel.unsubscribe();
            }

            if (typeof supabaseClient === 'undefined') {
                console.error("Supabase client is not configured.");
                return;
            }

            currentChannel = supabaseClient.channel(`room:${targetRoomId}`, {
                config: {
                    broadcast: { self: false }
                }
            });

            currentChannel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log(`Connected to broadcast channel for room: ${targetRoomId}`);
                }
            });
        }

        if (roomId) {
            connectToRoomChannel(roomId);
        }

        function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; 
                }

                if (!encryptionKey) {
                    alert("Encryption key missing! Please scan a QR code first.");
                    return;
                }
                
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();
                const originalContent = sendBtn.innerHTML;
                sendBtn.innerHTML = '<div class="loader-small"></div>';
                
                if (typeof supabaseClient === 'undefined') {
                    alert("Database / Connection settings missing.");
                    sendBtn.innerHTML = originalContent;
                    return;
                }

                if (!currentChannel) {
                    alert("Not connected to a Desk Display. Connecting now...");
                    connectToRoomChannel(roomId);
                }
                
                const payload = {
                    roomId: roomId,
                    type: type,
                    content: encryptedContent,
                    rawContent: message
                };

                // Pushes event instantly over established WebSocket
                currentChannel.send({
                    type: 'broadcast',
                    event: 'send-data',
                    payload: payload
                });

                // Since broadcast is fire-and-forget, execute UI updates immediately
                saveClipToDatabase(message);
                
                if (!msg) input.value = '';
                
                sendBtn.innerHTML = '✅ Sent!';
                sendBtn.style.background = 'var(--success)';
                sendBtn.style.borderColor = 'var(--success)';
                
                setTimeout(() => {
                    sendBtn.innerHTML = originalContent;
                    sendBtn.style.background = '';
                    sendBtn.style.borderColor = '';
                }, 2000);
            } else if (!roomId) {
                alert("Not connected to a Desk Display. Please scan a QR code first.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        startScanBtn.addEventListener('click', () => {
            readerDiv.style.display = 'block';
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'flex'; 

            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    stopScanner();
                    
                    if (decodedText.includes('/sender?room=')) {
                        try {
                            const url = new URL(decodedText);
                            const newRoomId = url.searchParams.get('room');
                            if (newRoomId) {
                                roomId = newRoomId;
                                if (url.hash.startsWith('#key=')) {
                                    encryptionKey = url.hash.substring(5);
                                } else {
                                    // Missing key for Custom Room. Use the room ID as the encryption key
                                    encryptionKey = newRoomId;
                                }
                                window.history.pushState({}, '', decodedText); 
                                connectToRoomChannel(roomId);
                                showToast("Connected securely!");
                                updateUIState();
                                return;
                            }
                        } catch (e) { console.error(e); }
                    }

                    sendMessage(decodedText);
                },
                (errorMessage) => {}
            ).catch((err) => {
                alert(`Error starting camera: ${err}`);
                stopScanner();
            });
        });

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => console.error(err));
            } else {
                readerDiv.style.display = 'none';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        stopScanBtn.addEventListener('click', stopScanner);


    </script>
</body>
</html>
