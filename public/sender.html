<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RSVYPTE9QZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Send Files - DropConnect</title>
    <meta name="description" content="Quickly send files, links, and text from your phone or device directly to your desktop using DropConnect.">
    <meta name="keywords" content="send files, file transfer, send to desktop, DropConnect sender">
    <link rel="canonical" href="https://dropconnect.up.railway.app/sender">
    <meta property="og:title" content="Send Files - DropConnect">
    <meta property="og:description" content="Quickly send files, links, and text from your phone or device directly to your desktop using DropConnect.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/sender">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Send Files - DropConnect">
    <meta name="twitter:description" content="Quickly send files, links, and text from your phone or device directly to your desktop using DropConnect.">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="crypto-js.min.js"></script>
    <script src="html5-qrcode.min.js"></script>
    <script src="vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        #reader { 
            width: 100%; 
            margin-top: 20px; 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            display: none; 
            background-color: var(--card-bg); 
            border: 1px solid var(--card-border); 
            box-shadow: var(--shadow-sm);
        }
        
        .loader-small { 
            width: 18px; 
            height: 18px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-left-color: white; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            display: inline-block; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .sender-card {
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 36px 28px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-scan {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn-scan:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container" style="margin-top: 20px;">
        
        <!-- Logo Block 'D' -->
        <div style="display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: var(--accent-gradient); border-radius: var(--radius-lg); color: white; font-weight: 800; font-size: 2rem; margin: 0 auto 16px auto; box-shadow: 0 8px 16px var(--accent-glow); user-select: none;">
            D
        </div>
        
        <h1 style="font-size: 1.85rem; margin-bottom: 6px;">Mobile Sender</h1>
        <p class="subtitle" style="margin-bottom: 32px;">Seamless End-to-End Encrypted Clipboard Transfer</p>

        <div class="sender-card">
            <!-- Disconnected State (Scan QR) -->
            <div id="state-disconnected" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; margin-top: 0; margin-bottom: 24px; text-align: center; max-width: 290px; font-weight: 500;">
                    Tap below to scan a Desk Display QR code and link your device session instantly.
                </p>
                
                <button class="btn-scan" id="startScanBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    Scan QR Code
                </button>
                
                <button class="btn" id="stopScanBtn" style="background: var(--danger); display: none; margin-top: 16px; box-shadow: none;">
                    Stop Scanner
                </button>
                
                <div id="reader"></div>
            </div>

            <!-- Connected State (Enter and Send Text) -->
            <div id="state-connected" style="display: none; flex-direction: column; width: 100%;">
                <div style="background: var(--success-bg); color: var(--success); padding: 10px 16px; border-radius: var(--radius-md); font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(16, 185, 129, 0.2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Secure connection active
                </div>
                
                <textarea id="msgInput" placeholder="Type or paste text, links, or lists to send..." autocomplete="off" rows="4" style="resize: vertical; min-height: 100px; font-size: 0.95rem; line-height: 1.5;"></textarea>
                
                <button class="btn" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Send to Display
                </button>

                <div class="divider" style="margin: 24px 0;">or switch receiver</div>

                <button class="btn btn-outline" id="reScanBtn" style="font-size: 0.9rem; padding: 10px;" onclick="disconnectSession()">
                    Scan New Display QR
                </button>
            </div>
            
            <div id="premium-banner-section" style="display: none; width: 100%; margin-top: 24px;">
            </div>
        </div>
        
        <div class="ad-banner" style="margin-top: 32px; width: 100%; max-width: 440px; background: var(--card-bg); backdrop-filter: var(--backdrop-blur); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-lg); font-size: 0.85rem; border: 1px solid var(--card-border); padding: 14px; box-sizing: border-box; text-align: center;">
            <div style="font-weight: 700; color: var(--accent-primary); font-size: 0.9rem;">🔒 End-to-End Encrypted</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">Data is encrypted client-side via AES before transmission.</div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let encryptionKey = '';
        let historyKey = '';
        let html5QrCode;

        if (window.location.hash.startsWith('#key=')) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            encryptionKey = hashParams.get('key') || '';
            historyKey = hashParams.get('hkey') || '';
        } else if (roomId) {
            encryptionKey = roomId;
        }
        
        const premiumSection = document.getElementById('premium-banner-section');
        
        async function checkAuthStatus() {
            if (typeof supabaseClient === 'undefined') return;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    document.querySelectorAll('.ad-banner').forEach(el => el.style.display = 'none');
                } else {
                    premiumSection.style.display = 'block';
                    premiumSection.innerHTML = `
                        <div class="divider" style="margin: 12px 0;">Premium</div>
                        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px; text-align: center;">Log in to unlock Auto-History & Ad-Free Experience!</div>
                        <button class="btn btn-outline" style="border-color: #f59e0b; color: #f59e0b;" onclick="window.location.href='/login'">Log In to Unlock</button>
                    `;
                }
            } catch(e) {}
        }
        checkAuthStatus();

        function updateUIState() {
            const disconnectedEl = document.getElementById('state-disconnected');
            const connectedEl = document.getElementById('state-connected');
            if (roomId) {
                disconnectedEl.style.display = 'none';
                connectedEl.style.display = 'flex';
            } else {
                disconnectedEl.style.display = 'flex';
                connectedEl.style.display = 'none';
            }
        }
        updateUIState();

        window.disconnectSession = function() {
            if (currentChannel) {
                currentChannel.unsubscribe();
                currentChannel = null;
            }
            roomId = '';
            encryptionKey = '';
            window.history.pushState({}, '', window.location.pathname);
            updateUIState();
        };

        async function saveClipToDatabase(content) {
            if (typeof supabaseClient === 'undefined') return false;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    let contentToSave = content;
                    if (historyKey) {
                        contentToSave = CryptoJS.AES.encrypt(content, historyKey).toString();
                    }
                    const { error } = await supabaseClient
                        .from('clips')
                        .insert([{ user_id: user.id, content: contentToSave }]);
                    if (error) {
                        return false;
                    } else {
                        return true;
                    }
                }
            } catch(e) {}
            return false;
        }

        let currentChannel;

        function connectToRoomChannel(targetRoomId) {
            if (!targetRoomId) return;
            if (currentChannel) {
                currentChannel.unsubscribe();
            }

            if (typeof supabaseClient === 'undefined') {
                return;
            }

            currentChannel = supabaseClient.channel(`room:${targetRoomId}`, {
                config: {
                    broadcast: { self: false }
                }
            });

            currentChannel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log(`Connected to broadcast channel for room: ${targetRoomId}`);
                }
            });
        }

        if (roomId) {
            connectToRoomChannel(roomId);
        }

        async function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; 
                }

                if (!encryptionKey) {
                    alert("Encryption key missing! Please scan a QR code first.");
                    return;
                }
                
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();
                const originalContent = sendBtn.innerHTML;
                sendBtn.innerHTML = '<div class="loader-small"></div>';
                
                if (typeof supabaseClient === 'undefined') {
                    alert("Database / Connection settings missing.");
                    sendBtn.innerHTML = originalContent;
                    return;
                }

                if (!currentChannel) {
                    connectToRoomChannel(roomId);
                }
                
                const savedToDb = await saveClipToDatabase(message);
                
                const payload = {
                    roomId: roomId,
                    type: type,
                    content: encryptedContent,
                    rawContent: message,
                    savedToDb: savedToDb
                };

                currentChannel.send({
                    type: 'broadcast',
                    event: 'send-data',
                    payload: payload
                });
                
                if (!msg) input.value = '';
                
                sendBtn.innerHTML = '✅ Sent!';
                sendBtn.style.background = 'var(--success)';
                if (typeof window.showToast === 'function') {
                    window.showToast("Data sent successfully!", "success");
                }
                
                setTimeout(() => {
                    sendBtn.innerHTML = originalContent;
                    sendBtn.style.background = '';
                }, 2000);
            } else if (!roomId) {
                alert("Not connected to a Desk Display. Please scan a QR code first.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        });

        startScanBtn.addEventListener('click', async () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Camera access is not supported by your current browser. Please open this page in Safari or Chrome to scan QR codes!");
                return;
            }

            readerDiv.style.display = 'block';
            readerDiv.innerHTML = `<div id="reader-loading" style="padding: 30px 20px; text-align: center; color: var(--text-secondary); font-size: 0.95rem; font-weight: 500;"><div class="loader-small" style="border-left-color: var(--accent-primary); width: 22px; height: 22px; border-width: 3px; margin-bottom: 10px;"></div><br/>Initializing camera...</div>`;
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'flex'; 

            try {
                if (typeof Html5Qrcode === 'undefined') {
                    throw new Error("Scanner library not loaded.");
                }
                
                html5QrCode = new Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 240, height: 240 } };
                
                const onScanSuccess = (decodedText, decodedResult) => {
                    stopScanner();
                    
                    if (decodedText.includes('/sender?room=')) {
                        try {
                            const url = new URL(decodedText);
                            const newRoomId = url.searchParams.get('room');
                            if (newRoomId) {
                                roomId = newRoomId;
                                if (url.hash.startsWith('#key=')) {
                                    const hashParams = new URLSearchParams(url.hash.substring(1));
                                    encryptionKey = hashParams.get('key') || '';
                                    historyKey = hashParams.get('hkey') || '';
                                } else {
                                    encryptionKey = newRoomId;
                                    historyKey = '';
                                }
                                window.history.pushState({}, '', decodedText); 
                                connectToRoomChannel(roomId);
                                if (typeof window.showToast === 'function') {
                                    window.showToast("Connected securely!", "success");
                                }
                                updateUIState();
                                return;
                            }
                        } catch (e) { console.error(e); }
                    }

                    sendMessage(decodedText);
                };

                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    (errorMessage) => {}
                ).catch(err => {
                    html5QrCode.start(
                        { facingMode: "user" },
                        config,
                        onScanSuccess,
                        (errorMessage) => {}
                    ).catch(err2 => {
                        Html5Qrcode.getCameras().then(devices => {
                            if (devices && devices.length > 0) {
                                html5QrCode.start(
                                    devices[0].id,
                                    config,
                                    onScanSuccess,
                                    (errorMessage) => {}
                                ).catch(err3 => {
                                    alert(`Error starting camera: ${err3.message || err3}`);
                                    stopScanner();
                                });
                            } else {
                                alert(`No camera found: ${err2.message || err2}`);
                                stopScanner();
                            }
                        }).catch(err3 => {
                            stopScanner();
                        });
                    });
                });
            } catch (err) {
                alert(`Scanner error: ${err.message || err}`);
                stopScanner();
            }
        });

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    readerDiv.innerHTML = '';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => {
                    readerDiv.style.display = 'none';
                    readerDiv.innerHTML = '';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                });
            } else {
                readerDiv.style.display = 'none';
                readerDiv.innerHTML = '';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        stopScanBtn.addEventListener('click', stopScanner);
    </script>
</body>
</html>
