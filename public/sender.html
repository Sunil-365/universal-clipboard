<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RSVYPTE9QZ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Sender</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        #reader { width: 100%; margin-top: 20px; border-radius: 8px; overflow: hidden; display: none; background-color: var(--card-bg); border: 1px solid var(--card-border); }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: transform 0.3s ease; box-shadow: var(--shadow-md); z-index: 100; white-space: nowrap; }
        .status-toast.show { transform: translateX(-50%) translateY(0); }
        .loader-small { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-left-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>


    <div class="container" style="margin-top: 40px; padding: 0;">
        <div class="card" data-tilt data-tilt-max="2" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.1" style="display: flex; flex-direction: column;">
            
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px;">
                <h2 style="margin: 0; font-size: 1.4rem;">Mobile Sender</h2>
                <div style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(16, 185, 129, 0.3); display: flex; align-items: center; gap: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2EE
                </div>
            </div>
            <p class="subtitle" style="margin-bottom: 20px;">Secure session established. Enter text or scan a URL to transmit.</p>
            
            <input type="text" id="msgInput" placeholder="Type a message or URL..." autocomplete="off" />
            <button class="btn" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Send Data
            </button>

            <div class="divider">or</div>

            <button class="btn btn-outline" id="startScanBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                Scan Display QR Code
            </button>
            <button class="btn" id="stopScanBtn" style="background: var(--danger); display: none;">
                Stop Scanner
            </button>
            
            <div id="reader"></div>
            
            <div id="premium-banner-section" style="display: none; width: 100%; margin-top: 15px;">
            </div>
        </div>
        
        <div class="ad-banner" style="margin-top: 20px; width: 100%; height: 50px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-secondary); font-size: 0.8rem; border: 1px dashed var(--card-border);">
            Ad Placement Placeholder
        </div>
    </div>
    
    <div id="toast" class="status-toast">Sent successfully!</div>
    
    <script>
        const socket = io();
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        const toast = document.getElementById('toast');
        
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let encryptionKey = '';
        let html5QrCode;

        if (window.location.hash.startsWith('#key=')) {
            encryptionKey = window.location.hash.substring(5);
        } else if (roomId) {
            // Missing key for Custom Room. Use the room ID as the encryption key
            encryptionKey = roomId;
        }
        
        const premiumSection = document.getElementById('premium-banner-section');
        const token = localStorage.getItem('token');

        if (token) {
            document.querySelectorAll('.ad-banner').forEach(el => el.style.display = 'none');
        } else {
            premiumSection.style.display = 'block';
            premiumSection.innerHTML = `
                <div class="divider" style="margin: 10px 0;">Premium</div>
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px; text-align: center;">Log in to unlock Auto-History & Ad-Free Experience!</div>
                <button class="btn btn-outline" style="border-color: #f59e0b; color: #f59e0b;" onclick="window.location.href='login.html'">Log In to Unlock</button>
            `;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; 
                }

                if (!encryptionKey) {
                    alert("Encryption key missing! Please scan a QR code first.");
                    return;
                }
                
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();
                const originalContent = sendBtn.innerHTML;
                sendBtn.innerHTML = '<div class="loader-small"></div>';
                
                setTimeout(() => {
                    socket.emit('send-data', {
                        roomId: roomId,
                        type: type,
                        content: encryptedContent,
                        rawContent: message,
                        token: localStorage.getItem('token')
                    });
                    
                    if (!msg) input.value = '';
                    
                    sendBtn.innerHTML = '✅ Sent!';
                    sendBtn.style.background = 'var(--success)';
                    sendBtn.style.borderColor = 'var(--success)';
                    
                    setTimeout(() => {
                        sendBtn.innerHTML = originalContent;
                        sendBtn.style.background = '';
                        sendBtn.style.borderColor = '';
                    }, 2000);
                }, 400); 
            } else if (!roomId) {
                alert("Not connected to a Desk Display. Please scan a QR code first.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        startScanBtn.addEventListener('click', () => {
            readerDiv.style.display = 'block';
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'flex'; 

            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    stopScanner();
                    
                    if (decodedText.includes('/sender.html?room=')) {
                        try {
                            const url = new URL(decodedText);
                            const newRoomId = url.searchParams.get('room');
                            if (newRoomId) {
                                roomId = newRoomId;
                                if (url.hash.startsWith('#key=')) {
                                    encryptionKey = url.hash.substring(5);
                                } else {
                                    encryptionKey = ''; // trigger modal
                                }
                                window.history.pushState({}, '', decodedText); 
                                showToast("Connected securely!");
                                return;
                            }
                        } catch (e) { console.error(e); }
                    }

                    sendMessage(decodedText);
                },
                (errorMessage) => {}
            ).catch((err) => {
                alert(`Error starting camera: ${err}`);
                stopScanner();
            });
        });

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => console.error(err));
            } else {
                readerDiv.style.display = 'none';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        stopScanBtn.addEventListener('click', stopScanner);
    </script>
</body>
</html>
