<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>

    <!-- Ad Network Script -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --danger: #f43f5e;
            --success: #34d399;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        h2 {
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        input { 
            width: 100%;
            padding: 14px 16px; 
            font-size: 16px; 
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            color: white;
            border-radius: 12px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent-primary);
        }
        
        input::placeholder {
            color: #64748b;
        }

        button { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            margin-bottom: 10px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        button.outline:hover {
            background: rgba(56, 189, 248, 0.1);
            box-shadow: none;
        }
        
        button.danger {
            background: linear-gradient(90deg, var(--danger), #be123c);
        }
        
        button.danger:hover {
            box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            background-color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
        }
        
        .status-toast {
            position: fixed;
            bottom: 20px;
            background: var(--success);
            color: #022c22;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(52, 211, 153, 0.4);
            z-index: 100;
        }
        
        .status-toast.show {
            transform: translateY(0);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 100%;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            color: white;
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn" title="Back to Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <h2 style="margin: 0; font-size: 1.4rem;">Sender Dashboard</h2>
                <div style="background: rgba(52, 211, 153, 0.2); color: var(--success); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--success); display: flex; align-items: center; gap: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2EE
                </div>
            </div>
            <div style="width: 44px; height: 40px;"></div>
        </div>
        <p class="subtitle">Secure session established. Enter text or scan a URL to transmit.</p>
        
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send Text
        </button>

        <div class="divider">or</div>

        <button id="startScanBtn" class="outline">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            Scan QR Code
        </button>
        <button id="stopScanBtn" class="danger" style="display: none;">
            Stop Scanner
        </button>
        
        <div id="reader"></div>
    </div>
    
    <div id="toast" class="status-toast">Sent successfully!</div>
    
    <script>
        const socket = io();
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        const toast = document.getElementById('toast');
        
        // Extract room ID and Encryption Key from URL
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        
        let encryptionKey = '';
        if (window.location.hash.startsWith('#key=')) {
            encryptionKey = window.location.hash.substring(5);
        }
        
        let html5QrCode;

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                
                // Auto-detect URL
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; // Prepend https so window.open works properly
                }

                // ENCRYPT THE DATA!
                if (!encryptionKey) {
                    alert("Encryption key missing! Please rescan the QR code.");
                    return;
                }
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();

                // Send encrypted data to the server
                socket.emit('send-data', {
                    roomId: roomId,
                    type: type,
                    content: encryptedContent
                });
                
                if (!msg) input.value = '';
                showToast(type === 'url' ? "URL sent successfully!" : "Text sent successfully!");
            } else if (!roomId) {
                alert("Not connected to Device 1. Please scan the connection QR code from Device 1.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // QR Code Scanner Logic
        startScanBtn.addEventListener('click', () => {
            readerDiv.style.display = 'block';
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'flex'; // Use flex to keep icon alignment if we had one

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    stopScanner();
                    
                    // 1. Check if the user is scanning the Device 1 connection QR code
                    if (decodedText.includes('/sender.html?room=')) {
                        try {
                            const url = new URL(decodedText);
                            const newRoomId = url.searchParams.get('room');
                            if (newRoomId) {
                                roomId = newRoomId;
                                
                                // Extract the new encryption key from the hash
                                if (url.hash.startsWith('#key=')) {
                                    encryptionKey = url.hash.substring(5);
                                }

                                window.history.pushState({}, '', decodedText); // Update URL in address bar
                                showToast("Connected securely to Device 1!");
                                return;
                            }
                        } catch (e) {
                            console.error("Invalid URL parsed", e);
                        }
                    }

                    // 2. Otherwise, let sendMessage auto-detect if it's a URL or Text
                    sendMessage(decodedText);
                },
                (errorMessage) => {
                    // Ignore continuous scan errors
                }
            ).catch((err) => {
                alert(`Error starting camera: ${err}. Note: Camera access requires HTTPS.`);
                stopScanner();
            });
        });

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => console.error("Failed to stop scanner", err));
            } else {
                readerDiv.style.display = 'none';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        stopScanBtn.addEventListener('click', stopScanner);
    </script>
</body>
</html>
