<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Mobile Sender - DropConnect</title>
    <meta name="description" content="Scan QR codes and send clipboard text or links instantly to your desktop.">
    <meta name="keywords" content="DropConnect sender, mobile sender, QR scanner clipboard">
    <link rel="canonical" href="https://dropconnect.up.railway.app/sender">
    <meta property="og:title" content="Mobile Sender - DropConnect">
    <meta property="og:description" content="Scan QR codes and send clipboard text or links instantly to your desktop.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/sender">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mobile Sender - DropConnect">
    <meta name="twitter:description" content="Scan QR codes and send clipboard text or links instantly to your desktop.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="crypto-js.min.js"></script>
    <script src="html5-qrcode.min.js"></script>
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        #reader {
            width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 2px solid var(--card-border);
            margin-top: 15px;
            display: none;
        }

        #reader video {
            border-radius: var(--radius-lg);
        }

        .btn-scan {
            background: var(--accent-gradient);
            color: white;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: var(--radius-md);
            border: none;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .btn-scan:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        textarea {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent-primary);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }

        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }

        .loader-small {
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <div class="container" style="margin-top: 20px; max-width: 480px;">
        <!-- Logo Branding -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px; justify-content: center;">
            <svg width="32" height="32" viewBox="0 0 512 512" style="border-radius: 8px;">
                <rect width="512" height="512" rx="112" fill="var(--accent-primary)"/>
                <path d="M120 256 L400 120 L280 400 L240 296 L120 256 Z" fill="#FFFFFF"/>
            </svg>
            <span style="font-weight: 800; font-size: 1.35rem; color: var(--text-primary); letter-spacing: -0.5px;">DropConnect</span>
        </div>

        <div class="card" style="display: flex; flex-direction: column; align-items: center;">
            <h2 style="margin-bottom: 6px; font-size: 1.45rem;">Mobile Sender</h2>
            <p class="subtitle" style="margin-bottom: 24px;">Scan a Desk Display QR code or paste clipboard contents to stream instantly.</p>
            
            <!-- Disconnected State (Camera Scan Trigger) -->
            <div id="state-disconnected" style="display: flex; flex-direction: column; width: 100%;">
                <button class="btn-scan" id="startScanBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    Scan Desk Display QR
                </button>
                
                <button class="btn btn-outline" id="stopScanBtn" style="display: none; margin-top: 10px; width: 100%;">
                    Cancel Camera Scanner
                </button>
                
                <div id="reader"></div>
            </div>

            <!-- Connected State (Enter and Send Text) -->
            <div id="state-connected" style="display: none; flex-direction: column; width: 100%;">
                <div style="background: var(--success-bg); color: var(--success); padding: 10px 16px; border-radius: var(--radius-md); font-size: 0.9rem; margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(5, 150, 105, 0.2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Secure connection active
                </div>

                <!-- Active Connected Devices Widget for Sender -->
                <div id="senderDevicesCard" style="margin-bottom: 16px; width: 100%; text-align: left; background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md); padding: 12px 16px; box-sizing: border-box;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                        <div style="font-weight: 700; font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                            Paired Devices (<span id="senderDeviceCount">1</span>)
                        </div>
                        <span style="font-size: 0.7rem; font-weight: 700; color: var(--success); background: var(--success-bg); padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(5, 150, 105, 0.2); display: flex; align-items: center; gap: 4px;">
                            <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block;"></span> LIVE
                        </span>
                    </div>
                    <div id="senderDevicesList" style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <!-- Devices rendered dynamically -->
                    </div>
                </div>
                
                <textarea id="msgInput" placeholder="Type or paste text, links, or code snippets to send..." autocomplete="off" rows="4" style="resize: vertical; min-height: 100px; font-size: 0.95rem; line-height: 1.5;"></textarea>
                
                <button class="btn" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Send to Display
                </button>

                <div class="divider" style="margin: 24px 0;">or switch receiver</div>

                <button class="btn btn-outline" id="reScanBtn" style="font-size: 0.9rem; padding: 10px;" onclick="disconnectSession()">
                    Scan New Display QR
                </button>
            </div>
            
            <div id="premium-banner-section" style="display: none; width: 100%; margin-top: 24px;">
            </div>
        </div>
        
        <div class="ad-banner" style="margin-top: 32px; width: 100%; max-width: 440px; background: var(--card-bg); backdrop-filter: var(--backdrop-blur); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-lg); font-size: 0.85rem; border: 1px solid var(--card-border); padding: 14px; box-sizing: border-box; text-align: center;">
            <div style="font-weight: 700; color: var(--accent-primary); font-size: 0.9rem;">🔒 End-to-End Encrypted</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">Data is encrypted client-side via AES before transmission.</div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        let encryptionKey = '';
        let historyKey = '';
        let html5QrCode;

        const myDeviceId = 'dev_' + Math.random().toString(36).substring(2, 9);
        let currentChannel;

        if (window.location.hash.startsWith('#key=')) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            encryptionKey = hashParams.get('key') || '';
            historyKey = hashParams.get('hkey') || '';
        } else if (roomId) {
            encryptionKey = roomId;
        }
        
        const premiumSection = document.getElementById('premium-banner-section');
        
        async function checkAuthStatus() {
            if (typeof supabaseClient === 'undefined') return;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    document.querySelectorAll('.ad-banner').forEach(el => el.style.display = 'none');
                } else {
                    premiumSection.style.display = 'block';
                    premiumSection.innerHTML = `
                        <div class="divider" style="margin: 12px 0;">Premium</div>
                        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px; text-align: center;">Log in to unlock Auto-History & Ad-Free Experience!</div>
                        <button class="btn btn-outline" style="border-color: #f59e0b; color: #f59e0b;" onclick="window.location.href='/login'">Log In to Unlock</button>
                    `;
                }
            } catch(e) {}
        }
        checkAuthStatus();

        function getDeviceMeta() {
            const ua = navigator.userAgent;
            let type = "mobile";
            let name = "Mobile Device";
            let icon = "📱";

            if (/iPhone|iPad|iPod|Android/i.test(ua)) {
                type = "mobile";
                icon = "📱";
                if (/iPhone/i.test(ua)) name = "iPhone";
                else if (/iPad/i.test(ua)) name = "iPad";
                else if (/Android/i.test(ua)) name = "Android Device";
            } else {
                type = "desktop";
                icon = "💻";
                if (/Macintosh/i.test(ua)) name = "Mac";
                else if (/Windows/i.test(ua)) name = "Windows PC";
            }

            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) name += " (Chrome)";
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) name += " (Safari)";
            else if (/Firefox/i.test(ua)) name += " (Firefox)";

            return { 
                id: myDeviceId, 
                name: name, 
                type: type, 
                icon: icon, 
                joinedAt: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
            };
        }

        function updateSenderDevicesUI(presenceState) {
            const devicesList = document.getElementById('senderDevicesList');
            const deviceCountEl = document.getElementById('senderDeviceCount');
            if (!devicesList || !deviceCountEl) return;

            let devices = [];
            Object.keys(presenceState).forEach(key => {
                const presences = presenceState[key];
                if (Array.isArray(presences)) {
                    presences.forEach(p => {
                        if (p && p.name && !devices.some(d => d.id === p.id)) {
                            devices.push(p);
                        }
                    });
                }
            });

            if (devices.length === 0) {
                devices.push(getDeviceMeta());
            }

            deviceCountEl.textContent = devices.length;
            devicesList.innerHTML = '';

            devices.forEach(dev => {
                const isMe = dev.id === myDeviceId;
                const badge = document.createElement('div');
                badge.style.cssText = `
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    background: var(--card-bg);
                    border: 1px solid ${isMe ? 'var(--accent-primary)' : 'var(--card-border)'};
                    padding: 5px 12px;
                    border-radius: 16px;
                    font-size: 0.78rem;
                    font-weight: 600;
                    color: var(--text-primary);
                    box-shadow: var(--shadow-sm);
                `;
                badge.innerHTML = `
                    <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success);"></span>
                    <span>${dev.icon || '📱'}</span>
                    <span>${escapeHTML(dev.name)} ${isMe ? '<span style="color: var(--text-muted); font-size: 0.7rem;">(This Device)</span>' : ''}</span>
                `;
                devicesList.appendChild(badge);
            });
        }

        function updateUIState() {
            const disconnectedEl = document.getElementById('state-disconnected');
            const connectedEl = document.getElementById('state-connected');
            if (roomId) {
                disconnectedEl.style.display = 'none';
                connectedEl.style.display = 'flex';
            } else {
                disconnectedEl.style.display = 'flex';
                connectedEl.style.display = 'none';
            }
        }
        updateUIState();

        window.disconnectSession = function() {
            if (currentChannel) {
                currentChannel.unsubscribe();
                currentChannel = null;
            }
            roomId = '';
            encryptionKey = '';
            window.history.pushState({}, '', window.location.pathname);
            updateUIState();
        };

        async function saveClipToDatabase(content) {
            if (typeof supabaseClient === 'undefined') return false;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    let contentToSave = content;
                    if (historyKey) {
                        contentToSave = CryptoJS.AES.encrypt(content, historyKey).toString();
                    }
                    const { error } = await supabaseClient
                        .from('clips')
                        .insert([{ user_id: user.id, content: contentToSave }]);
                    if (error) {
                        return false;
                    } else {
                        return true;
                    }
                }
            } catch(e) {}
            return false;
        }

        function connectToRoomChannel(targetRoomId) {
            if (!targetRoomId) return;
            if (currentChannel) {
                currentChannel.unsubscribe();
            }

            if (typeof supabaseClient === 'undefined') {
                return;
            }

            currentChannel = supabaseClient.channel(`room:${targetRoomId}`, {
                config: {
                    broadcast: { self: false },
                    presence: { key: myDeviceId }
                }
            });

            currentChannel
                .on('presence', { event: 'sync' }, () => {
                    const state = currentChannel.presenceState();
                    updateSenderDevicesUI(state);
                })
                .on('presence', { event: 'join' }, () => {
                    const state = currentChannel.presenceState();
                    updateSenderDevicesUI(state);
                })
                .on('presence', { event: 'leave' }, () => {
                    const state = currentChannel.presenceState();
                    updateSenderDevicesUI(state);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        console.log(`Connected to sync channel for room: ${targetRoomId}`);
                        await currentChannel.track(getDeviceMeta());
                    }
                });
        }

        if (roomId) {
            connectToRoomChannel(roomId);
        }

        async function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; 
                }

                if (!encryptionKey) {
                    alert("Encryption key missing! Please scan a QR code first.");
                    return;
                }
                
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();
                const originalContent = sendBtn.innerHTML;
                sendBtn.innerHTML = '<div class="loader-small"></div>';
                
                if (typeof supabaseClient === 'undefined') {
                    alert("Database / Connection settings missing.");
                    sendBtn.innerHTML = originalContent;
                    return;
                }

                if (!currentChannel) {
                    connectToRoomChannel(roomId);
                }
                
                const savedToDb = await saveClipToDatabase(message);
                
                const payload = {
                    roomId: roomId,
                    type: type,
                    content: encryptedContent,
                    rawContent: message,
                    savedToDb: savedToDb
                };

                currentChannel.send({
                    type: 'broadcast',
                    event: 'send-data',
                    payload: payload
                });
                
                if (!msg) input.value = '';
                
                sendBtn.innerHTML = '✅ Sent!';
                sendBtn.style.background = 'var(--success)';
                if (typeof window.showToast === 'function') {
                    window.showToast("Data sent successfully!", "success");
                }
                
                setTimeout(() => {
                    sendBtn.innerHTML = originalContent;
                    sendBtn.style.background = '';
                }, 2000);
            } else if (!roomId) {
                alert("Not connected to a Desk Display. Please scan a QR code first.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        });

        startScanBtn.addEventListener('click', () => {
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'block';
            readerDiv.style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                stopScanner();

                try {
                    let targetUrlStr = decodedText;
                    if (!targetUrlStr.startsWith('http://') && !targetUrlStr.startsWith('https://')) {
                        targetUrlStr = window.location.origin + (decodedText.startsWith('/') ? decodedText : '/' + decodedText);
                    }
                    const parsedUrl = new URL(targetUrlStr);
                    const scannedRoomId = parsedUrl.searchParams.get('room');
                    
                    let scannedKey = '';
                    let scannedHkey = '';
                    if (parsedUrl.hash.startsWith('#key=')) {
                        const hashParams = new URLSearchParams(parsedUrl.hash.substring(1));
                        scannedKey = hashParams.get('key');
                        scannedHkey = hashParams.get('hkey');
                    }

                    if (scannedRoomId) {
                        roomId = scannedRoomId;
                        encryptionKey = scannedKey || scannedRoomId;
                        if (scannedHkey) historyKey = scannedHkey;

                        window.history.pushState({}, '', `?room=${roomId}${scannedKey ? '#key=' + scannedKey : ''}`);
                        updateUIState();
                        connectToRoomChannel(roomId);
                        if (typeof window.showToast === 'function') {
                            window.showToast("QR code scanned & room linked!", "success");
                        }
                    } else {
                        alert("Invalid DropConnect QR Code.");
                    }
                } catch(e) {
                    alert("Scanned QR code content is invalid.");
                }
            };

            const config = { fps: 10, qrbox: { width: 220, height: 220 } };

            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
                .catch((err) => {
                    console.error("Unable to start scanning", err);
                    alert("Unable to access camera. Please allow camera permissions or use direct room URL.");
                    stopScanner();
                });
        });

        stopScanBtn.addEventListener('click', () => {
            stopScanner();
        });

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    readerDiv.style.display = 'none';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => {
                    console.error("Failed to stop scanner", err);
                });
            } else {
                readerDiv.style.display = 'none';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
