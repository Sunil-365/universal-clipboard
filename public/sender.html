<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RSVYPTE9QZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent-primary);
        }

        h2 {
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.8rem;
            color: var(--accent-primary);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        input { 
            width: 100%;
            padding: 14px 16px; 
            font-size: 16px; 
            background: #f8fafc;
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent-primary);
        }
        
        input::placeholder {
            color: #94a3b8;
        }

        button { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: 600;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            margin-bottom: 10px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            background: #4338ca;
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        button.outline:hover {
            background: #e0e7ff;
        }
        
        button.danger {
            background: var(--danger);
        }
        
        button.danger:hover {
            background: #dc2626;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
        }
        
        .status-toast {
            position: fixed;
            bottom: 20px;
            background: var(--success);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transform: translateY(150%);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        
        .status-toast.show {
            transform: translateY(0);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 100%;
        }

        .back-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }
        
        .loader-small {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-left-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
</head>
<body>

    <div class="container" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
        <div class="header">
            <a href="/" class="back-btn" title="Back to Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <h2 style="margin: 0; font-size: 1.4rem;">Sender Dashboard</h2>
                <div style="background: rgba(52, 211, 153, 0.2); color: var(--success); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--success); display: flex; align-items: center; gap: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2EE
                </div>
            </div>
            <div style="width: 44px; height: 40px;"></div>
        </div>
        <p class="subtitle">Secure session established. Enter text or scan a URL to transmit.</p>
        
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send Text
        </button>

        <div class="divider">or</div>

        <button id="startScanBtn" class="outline">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            Scan QR Code
        </button>
        <button id="stopScanBtn" class="danger" style="display: none;">
            Stop Scanner
        </button>
        
        <div id="reader"></div>
        
        <div id="premium-upload-section" style="display: none; width: 100%; margin-top: 15px;">
            <div class="divider" style="margin: 10px 0;">Premium</div>
            <input type="file" id="fileInput" style="display: none;" />
            <button id="uploadBtn" class="outline" style="border-color: #f59e0b; color: #f59e0b;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Send File
            </button>
        </div>
    </div>
    
    <div id="toast" class="status-toast">Sent successfully!</div>
    
    <script>
        const socket = io();
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const readerDiv = document.getElementById('reader');
        const toast = document.getElementById('toast');
        
        // Extract room ID and Encryption Key from URL
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        
        let encryptionKey = '';
        if (window.location.hash.startsWith('#key=')) {
            encryptionKey = window.location.hash.substring(5);
        }
        
        let html5QrCode;

        // Premium Section Check
        const premiumSection = document.getElementById('premium-upload-section');
        const token = localStorage.getItem('token');
        if (token) {
            premiumSection.style.display = 'block';
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function sendMessage(msg) {
            let message = msg || input.value.trim();
            if (message && roomId) {
                let type = 'text';
                
                // Auto-detect URL
                if (/^https?:\/\//i.test(message)) {
                    type = 'url';
                } else if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(message)) {
                    type = 'url';
                    message = 'https://' + message; // Prepend https so window.open works properly
                }

                // ENCRYPT THE DATA!
                if (!encryptionKey) {
                    alert("Encryption key missing! Please rescan the QR code.");
                    return;
                }
                const encryptedContent = CryptoJS.AES.encrypt(message, encryptionKey).toString();

                // Send encrypted data to the server
                const originalContent = sendBtn.innerHTML;
                sendBtn.innerHTML = '<div class="loader-small"></div>';
                
                setTimeout(() => {
                    socket.emit('send-data', {
                        roomId: roomId,
                        type: type,
                        content: encryptedContent,
                        token: localStorage.getItem('token')
                    });
                    
                    if (!msg) input.value = '';
                    
                    sendBtn.innerHTML = '✅ Sent!';
                    sendBtn.style.background = 'var(--success)';
                    
                    setTimeout(() => {
                        sendBtn.innerHTML = originalContent;
                        sendBtn.style.background = '';
                    }, 2000);
                }, 400); // Premium delay
            } else if (!roomId) {
                alert("Not connected to Device 1. Please scan the connection QR code from Device 1.");
            }
        }
        
        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // QR Code Scanner Logic
        startScanBtn.addEventListener('click', () => {
            readerDiv.style.display = 'block';
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'flex'; // Use flex to keep icon alignment if we had one

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    stopScanner();
                    
                    // 1. Check if the user is scanning the Device 1 connection QR code
                    if (decodedText.includes('/sender.html?room=')) {
                        try {
                            const url = new URL(decodedText);
                            const newRoomId = url.searchParams.get('room');
                            if (newRoomId) {
                                roomId = newRoomId;
                                
                                // Extract the new encryption key from the hash
                                if (url.hash.startsWith('#key=')) {
                                    encryptionKey = url.hash.substring(5);
                                }

                                window.history.pushState({}, '', decodedText); // Update URL in address bar
                                showToast("Connected securely to Device 1!");
                                return;
                            }
                        } catch (e) {
                            console.error("Invalid URL parsed", e);
                        }
                    }

                    // 2. Otherwise, let sendMessage auto-detect if it's a URL or Text
                    sendMessage(decodedText);
                },
                (errorMessage) => {
                    // Ignore continuous scan errors
                }
            ).catch((err) => {
                alert(`Error starting camera: ${err}. Note: Camera access requires HTTPS.`);
                stopScanner();
            });
        });

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    startScanBtn.style.display = 'flex';
                    stopScanBtn.style.display = 'none';
                }).catch(err => console.error("Failed to stop scanner", err));
            } else {
                readerDiv.style.display = 'none';
                startScanBtn.style.display = 'flex';
                stopScanBtn.style.display = 'none';
            }
        }

        stopScanBtn.addEventListener('click', stopScanner);

        // File Upload Logic
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');

        if (uploadBtn) {
            uploadBtn.addEventListener('click', () => fileInput.click());
        }

        if (fileInput) {
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (!roomId) {
                    alert("Not connected to a receiver.");
                    return;
                }

                const formData = new FormData();
                formData.append('file', file);
                
                const originalHtml = uploadBtn.innerHTML;
                uploadBtn.innerHTML = '<div class="loader-small" style="border-left-color: #f59e0b;"></div> Uploading...';
                uploadBtn.disabled = true;

                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    if (!res.ok) throw new Error("Upload failed");
                    const data = await res.json(); // { url, filename, mimetype }
                    
                    // Emit unencrypted for now (or encrypt the URL, but receiver needs to know how to handle files)
                    socket.emit('send-data', {
                        roomId: roomId,
                        type: 'file',
                        content: window.location.origin + data.url,
                        filename: data.filename,
                        token: token
                    });
                    
                    showToast("File sent successfully!");
                } catch (err) {
                    alert("File upload failed. Ensure you have Premium.");
                } finally {
                    uploadBtn.innerHTML = originalHtml;
                    uploadBtn.disabled = false;
                    fileInput.value = '';
                }
            });
        }
    </script>
</body>
</html>
