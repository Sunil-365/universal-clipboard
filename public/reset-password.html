<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - DropConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="theme.js"></script>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; align-items: center; justify-content: center; background: var(--bg-color); }
        .auth-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-sm); }
        h1 { font-weight: 800; font-size: 1.8rem; margin-top: 0; margin-bottom: 25px; text-align: center; color: var(--text-primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        input { width: 100%; padding: 14px 15px; font-size: 1rem; background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; transition: border-color 0.2s; font-family: inherit; }
        input:focus { outline: none; border-color: var(--accent-primary); }
        .error-msg { font-size: 0.9rem; text-align: center; margin-bottom: 15px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>Set New Password</h1>
        <div class="error-msg" id="error-msg" style="color: var(--danger);"></div>
        
        <form id="reset-form">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn" id="submit-btn" style="width: 100%;">Update Password</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const errorMsg = document.getElementById('error-msg');
            
            // Supabase automatically parses the access token from the URL hash on load
            // We just need to check if we have a session
            const { data, error } = await supabaseClient.auth.getSession();
            if (error || !data.session) {
                errorMsg.innerText = "Invalid or expired recovery link.";
                document.getElementById('reset-form').style.display = 'none';
                return;
            }

            const form = document.getElementById('reset-form');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                errorMsg.innerText = "";
                submitBtn.disabled = true;
                submitBtn.innerText = "Updating...";

                try {
                    const { error } = await supabaseClient.auth.updateUser({
                        password: password
                    });

                    if (error) {
                        errorMsg.style.color = 'var(--danger)';
                        errorMsg.innerText = error.message;
                    } else {
                        errorMsg.style.color = 'var(--success)';
                        errorMsg.innerText = "Password updated successfully!";
                        setTimeout(() => {
                            window.location.href = 'premium';
                        }, 2000);
                    }
                } catch (err) {
                    errorMsg.style.color = 'var(--danger)';
                    errorMsg.innerText = "An error occurred. Please try again.";
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Update Password";
                }
            });
        });
    </script>
</body>
</html>
