<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>DropConnect Dashboard - Your Spaces & History</title>
    <meta name="description" content="Access your DropConnect dashboard to manage your permanent clipboard history, multiple spaces, and connected devices.">
    <meta name="keywords" content="DropConnect dashboard, clipboard history, synced spaces, file sharing">
    <link rel="canonical" href="https://dropconnect.up.railway.app/premium">
    <meta property="og:title" content="DropConnect Dashboard - Your Spaces & History">
    <meta property="og:description" content="Access your DropConnect dashboard to manage your permanent clipboard history, multiple spaces, and connected devices.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/premium">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="DropConnect Dashboard - Your Spaces & History">
    <meta name="twitter:description" content="Access your DropConnect dashboard to manage your permanent clipboard history, multiple spaces, and connected devices.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <script src="crypto-js.min.js"></script>

    <style>
        .dashboard-container { 
            width: 100%; 
            max-width: 960px; 
            margin: 20px auto 40px auto; 
            padding: 0 20px; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 28px; 
            background: var(--card-bg); 
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            padding: 24px 32px; 
            border-radius: var(--radius-xl); 
            border: 1px solid var(--card-border); 
            box-shadow: var(--shadow-glass); 
        }
        h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-primary); 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 12px; 
        }
        .badge { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            box-shadow: 0 2px 8px rgba(217, 119, 6, 0.3);
        }
        
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 24px; 
            margin-bottom: 36px; 
        }
        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: minmax(220px, 280px) 1fr;
            }
        }
        .dashboard-card { 
            background: var(--card-bg); 
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-xl); 
            padding: 28px; 
            box-shadow: var(--shadow-glass); 
            display: flex; 
            flex-direction: column; 
        }
        
        .clips-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            gap: 14px; 
        }
        .clips-header h2 { 
            margin: 0; 
            font-size: 1.45rem; 
            color: var(--text-primary); 
        }
        
        .clips-list { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }
        .clip-card { 
            background: var(--card-bg); 
            backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-lg); 
            padding: 20px 24px; 
            position: relative; 
            transition: all 0.2s ease; 
            box-shadow: var(--shadow-sm);
        }
        .clip-card:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-md); 
            border-color: var(--accent-primary);
        }
        .clip-content { 
            font-size: 0.95rem; 
            color: var(--text-primary); 
            white-space: pre-wrap; 
            word-break: break-word; 
            margin: 0 0 16px 0; 
            font-family: inherit; 
            line-height: 1.5;
        }
        .clip-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
        }
        .clip-actions button { 
            background: var(--bg-surface); 
            border: 1px solid var(--card-border); 
            padding: 6px 14px; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            margin-left: 6px; 
            transition: all 0.2s ease; 
            font-weight: 600; 
        }
        .clip-actions button:hover { 
            background: var(--accent-primary); 
            color: white; 
            border-color: var(--accent-primary);
        }
        .clip-actions button.delete:hover { 
            color: white; 
            border-color: var(--danger); 
            background: var(--danger); 
        }
        
        .empty-state { 
            text-align: center; 
            padding: 40px; 
            color: var(--text-muted); 
            font-style: italic;
        }
        
        #auth-guard { text-align: center; margin-top: 100px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--card-border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .received-items { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; 
            flex: 1; 
            padding-right: 4px; 
            max-height: 250px; 
            text-align: left; 
            margin-top: 15px; 
            width: 100%; 
        }
        .received-card { 
            background: var(--bg-surface); 
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-md); 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            text-align: left; 
            width: 100%; 
        }
        .received-content { 
            flex: 1; 
            white-space: pre-wrap; 
            word-break: break-word; 
            margin-right: 15px; 
            color: var(--text-primary); 
            font-weight: 500; 
            font-size: 0.95rem; 
        }
        
        .space-item { 
            padding: 12px 16px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--card-border); 
            cursor: pointer; 
            transition: all 0.2s ease; 
            background: var(--bg-surface); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--text-primary); 
            font-weight: 600;
            font-size: 0.95rem;
        }
        .space-item:hover { 
            border-color: var(--accent-primary); 
            transform: translateX(2px);
        }
        .space-item.active { 
            background: var(--accent-gradient); 
            color: white; 
            border-color: transparent; 
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .space-delete { 
            background: none; 
            border: none; 
            color: inherit; 
            cursor: pointer; 
            opacity: 0.7; 
            padding: 4px 8px; 
            font-size: 1.1rem;
        }
        .space-delete:hover { 
            opacity: 1; 
        }
    </style>
</head>
<body>
    
    <div id="auth-guard">
        <div class="spinner"></div>
        <h2>Authenticating dashboard...</h2>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <div class="header">
            <h1>Command Center <span class="badge">Premium</span></h1>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card" style="padding: 20px;">
                <h3 style="margin-bottom: 16px; font-size: 1.1rem; border-bottom: 1px solid var(--card-border); padding-bottom: 12px; text-align: center;">My Spaces</h3>
                <div id="spaces-list" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px;">
                </div>
                <button class="btn btn-outline" id="new-space-btn" style="width: 100%; font-size: 0.9rem; padding: 10px;">+ Create New Space</button>
            </div>
            <div class="dashboard-card" id="space-view-card">
                <h3 id="active-space-title" style="text-align: center;">Select a Space</h3>
                <div id="room-claim-section" style="display: none; flex: 1; flex-direction: column; justify-content: center; width: 100%; max-width: 400px; margin: 0 auto;">
                    <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 16px; text-align: center;">Claim a custom room URL to display on your monitor.</p>
                    <input type="text" id="custom-room-input" placeholder="Room ID (e.g. OfficeMac)" style="width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: var(--radius-md); border: 1px solid var(--card-border); background: var(--bg-surface); font-family: inherit; color: var(--text-primary); outline: none;">
                    <button class="btn" id="claim-room-btn" style="width: 100%;">Save Room ID</button>
                </div>
                <div id="room-active-section" style="display: none; text-align: center; flex: 1; flex-direction: column; justify-content: center; align-items: center;">
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px;">Leave this open. The QR code never expires.</p>
                    <div id="persistent-qr" style="background: white; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--card-border); margin-bottom: 16px; box-shadow: var(--shadow-sm);"></div>
                    <div style="width: 100%; border-top: 1px solid var(--card-border); margin-top: 10px; padding-top: 16px;">
                        <div class="received-items" id="dashboard-receiver">
                            <div id="dashboard-empty" style="color: var(--text-secondary); text-align: center; font-style: italic; font-size: 0.9rem;">
                                Waiting for incoming items...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="clips-header">
            <h2>Permanent History</h2>
            <div style="display: flex; gap: 12px; align-items: center;">
                <input type="text" id="search-input" placeholder="Search history..." style="padding: 10px 16px; border-radius: var(--radius-md); border: 1px solid var(--card-border); font-size: 0.9rem; width: 200px; background: var(--bg-surface); color: var(--text-primary); outline: none; margin-bottom: 0;">
                <span id="clip-count" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;"></span>
            </div>
        </div>
        
        <div class="clips-list" id="clips-list">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authGuard = document.getElementById('auth-guard');
            const dashboard = document.getElementById('dashboard');
            const clipsList = document.getElementById('clips-list');
            const clipCount = document.getElementById('clip-count');
            
            if (typeof supabaseClient === 'undefined') {
                alert("Supabase Client is not configured. Please configure it in supabase-config.js.");
                window.location.href = '/login';
                return;
            }

            authGuard.style.display = 'block';

            const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
            if (authError || !user) {
                window.location.href = '/login';
                return;
            }

            authGuard.style.display = 'none';
            dashboard.style.display = 'block';

            if (!localStorage.getItem('history-key')) {
                const hexKey = Array.from(crypto.getRandomValues(new Uint8Array(16)))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');
                localStorage.setItem('history-key', hexKey);
            }

            let customRooms = [];
            let currentActiveRoom = null;
            let currentActiveChannel = null;

            fetchClips();
            fetchPersistentRooms();

            async function fetchPersistentRooms() {
                try {
                    const { data, error } = await supabaseClient
                        .from('rooms')
                        .select('id')
                        .eq('owner_id', user.id);
                    
                    if (error) throw error;
                    customRooms = data.map(r => r.id) || [];
                    
                    if (currentActiveRoom && !customRooms.includes(currentActiveRoom)) {
                        currentActiveRoom = null;
                    }
                    
                    if (!currentActiveRoom && customRooms.length > 0) {
                        currentActiveRoom = customRooms[0];
                    }
                    
                    renderSpaces();
                    activateRoomView();
                } catch (e) {
                    console.error("Failed to load spaces:", e);
                }
            }
            
            function renderSpaces() {
                const spacesList = document.getElementById('spaces-list');
                if (customRooms.length === 0) {
                    spacesList.innerHTML = '<div style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;">No spaces yet.</div>';
                    return;
                }
                
                spacesList.innerHTML = customRooms.map(roomId => `
                    <div class="space-item ${roomId === currentActiveRoom ? 'active' : ''}" onclick="selectSpace('${roomId}')">
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${roomId}</span>
                        <button class="space-delete" onclick="event.stopPropagation(); deleteSpace('${roomId}')">×</button>
                    </div>
                `).join('');
            }
            
            window.selectSpace = (roomId) => {
                currentActiveRoom = roomId;
                renderSpaces();
                activateRoomView();
            };
            
            window.deleteSpace = async (roomId) => {
                if(!confirm(`Delete space "${roomId}"?`)) return;
                try {
                    const { error } = await supabaseClient
                        .from('rooms')
                        .delete()
                        .eq('id', roomId);
                    
                    if (error) throw error;
                    
                    if (currentActiveChannel && currentActiveRoom === roomId) {
                        currentActiveChannel.unsubscribe();
                        currentActiveChannel = null;
                    }
                    fetchPersistentRooms();
                } catch (e) {
                    alert("Error deleting space: " + e.message);
                }
            };
            
            document.getElementById('new-space-btn').addEventListener('click', () => {
                if (customRooms.length >= 5) return alert("Maximum of 5 spaces allowed.");
                currentActiveRoom = null;
                renderSpaces();
                activateRoomView();
            });

            function activateRoomView() {
                const claimSection = document.getElementById('room-claim-section');
                const activeSection = document.getElementById('room-active-section');
                const title = document.getElementById('active-space-title');
                const inputField = document.getElementById('custom-room-input');
                
                if (currentActiveRoom) {
                    title.innerText = "Space: " + currentActiveRoom;
                    claimSection.style.display = 'none';
                    activeSection.style.display = 'flex';
                    
                    const currentUrl = window.location.origin;
                    const roomKeyName = `room-key:${currentActiveRoom}`;
                    if (!localStorage.getItem(roomKeyName)) {
                        const hexKey = Array.from(crypto.getRandomValues(new Uint8Array(16)))
                            .map(b => b.toString(16).padStart(2, '0'))
                            .join('');
                        localStorage.setItem(roomKeyName, hexKey);
                    }
                    const roomKey = localStorage.getItem(roomKeyName);
                    const historyKey = localStorage.getItem('history-key') || '';
                    const senderUrl = `${currentUrl}/sender?room=${currentActiveRoom}#key=${roomKey}&hkey=${historyKey}`;
                    
                    const qrTarget = document.getElementById('persistent-qr');
                    qrTarget.innerHTML = '';
                    if (typeof QRCode !== 'undefined') {
                        new QRCode(qrTarget, {
                            text: senderUrl,
                            width: 150,
                            height: 150,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.M
                        });
                    } else {
                        qrTarget.innerHTML = '<div style="color: var(--danger);">QR Error</div>';
                    }
                    
                    document.getElementById('dashboard-receiver').innerHTML = '<div id="dashboard-empty" style="color: var(--text-secondary); text-align: center; font-style: italic; font-size: 0.9rem;">Waiting for incoming items...</div>';

                    if (currentActiveChannel) {
                        currentActiveChannel.unsubscribe();
                        currentActiveChannel = null;
                    }
                    
                    currentActiveChannel = supabaseClient.channel(`room:${currentActiveRoom}`, {
                        config: { broadcast: { self: false } }
                    });
                    
                    currentActiveChannel
                        .on('broadcast', { event: 'send-data' }, async ({ payload }) => {
                            const roomKey = localStorage.getItem(`room-key:${currentActiveRoom}`) || currentActiveRoom;
                            const bytes = CryptoJS.AES.decrypt(payload.content, roomKey);
                            const originalText = bytes.toString(CryptoJS.enc.Utf8);
                            
                            if (originalText) {
                                const historyKey = localStorage.getItem('history-key');
                                if (historyKey) {
                                    if (!payload.savedToDb) {
                                        try {
                                            const encryptedForDb = CryptoJS.AES.encrypt(originalText, historyKey).toString();
                                            const { error: dbError } = await supabaseClient
                                                .from('clips')
                                                .insert([{ user_id: user.id, content: encryptedForDb }]);
                                            if (dbError) throw dbError;
                                            fetchClips();
                                        } catch (dbErr) {
                                            console.error("Failed to save clip:", dbErr);
                                        }
                                    } else {
                                        fetchClips();
                                    }
                                }
                                try {
                                    await navigator.clipboard.writeText(originalText);
                                    if (typeof window.showToast === 'function') {
                                        window.showToast('Auto-copied to clipboard!', 'success');
                                    }
                                } catch (e) {}

                                const receiverBox = document.getElementById('dashboard-receiver');
                                const empty = document.getElementById('dashboard-empty');
                                if(empty) empty.style.display = 'none';
                                
                                const card = document.createElement('div');
                                card.className = 'received-card';
                                
                                const contentDiv = document.createElement('div');
                                contentDiv.className = 'received-content';
                                
                                if (payload.type === 'url') {
                                    contentDiv.innerHTML = `<a href="${originalText}" target="_blank" style="color: var(--accent-primary); font-weight: 600;">${originalText}</a>`;
                                } else {
                                    contentDiv.textContent = originalText;
                                }
                                
                                const copyBtn = document.createElement('button');
                                copyBtn.className = 'btn';
                                copyBtn.style.padding = '6px 14px';
                                copyBtn.style.width = 'auto';
                                copyBtn.style.fontSize = '0.85rem';
                                copyBtn.innerHTML = 'Copy';
                                copyBtn.onclick = async () => {
                                    try {
                                        await navigator.clipboard.writeText(originalText);
                                        if (typeof window.showToast === 'function') {
                                            window.showToast('Copied to clipboard!', 'success');
                                        }
                                    } catch(e) {
                                        if (typeof window.showToast === 'function') {
                                            window.showToast('Failed to copy', 'error');
                                        }
                                    }
                                };
                                
                                card.appendChild(contentDiv);
                                card.appendChild(copyBtn);
                                receiverBox.insertBefore(card, receiverBox.firstChild);
                            }
                        })
                        .subscribe();
                    
                } else {
                    title.innerText = "Create New Space";
                    claimSection.style.display = 'flex';
                    activeSection.style.display = 'none';
                    inputField.value = '';
                }
            }

            const claimBtn = document.getElementById('claim-room-btn');
            if(claimBtn) claimBtn.addEventListener('click', async () => {
                const roomName = document.getElementById('custom-room-input').value.trim();
                if (!roomName) return alert('Room Name required.');
                
                claimBtn.disabled = true;
                claimBtn.innerText = "Saving...";
                try {
                    const { data: existingRoom, error: checkError } = await supabaseClient
                        .from('rooms')
                        .select('owner_id')
                        .eq('id', roomName)
                        .maybeSingle();
                        
                    if (existingRoom && existingRoom.owner_id !== user.id) {
                        throw new Error("This Room ID is already claimed by another user.");
                    }
                    
                    if (!existingRoom) {
                        const { error: insertError } = await supabaseClient
                            .from('rooms')
                            .insert([{ id: roomName, owner_id: user.id }]);
                        if (insertError) throw insertError;
                    }
                    
                    currentActiveRoom = roomName;
                    fetchPersistentRooms();
                } catch (err) {
                    alert(err.message);
                } finally {
                    claimBtn.disabled = false;
                    claimBtn.innerText = "Save Room ID";
                }
            });

            let allClips = [];
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allClips.filter(c => c.content.toLowerCase().includes(term));
                renderClips(filtered);
            });

            async function fetchClips() {
                try {
                    const { data, error } = await supabaseClient
                        .from('clips')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    allClips = data || [];
                    renderClips(allClips);
                } catch (err) {
                    clipsList.innerHTML = '<div class="empty-state">Error loading clips.</div>';
                }
            }

            function renderClips(clips) {
                clipCount.innerText = `${clips.length} saved`;
                if (clips.length === 0) {
                    clipsList.innerHTML = '<div class="empty-state">No saved clips yet. Start syncing!</div>';
                    return;
                }

                const historyKey = localStorage.getItem('history-key') || '';

                clipsList.innerHTML = clips.map(clip => {
                    let decryptedContent = clip.content;
                    if (historyKey) {
                        try {
                            const bytes = CryptoJS.AES.decrypt(clip.content, historyKey);
                            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                            if (decrypted) {
                                decryptedContent = decrypted;
                            }
                        } catch (err) {}
                    }
                    return `
                        <div class="clip-card" id="clip-${clip.id}">
                            <pre class="clip-content">${escapeHTML(decryptedContent)}</pre>
                            <div class="clip-meta">
                                <span>${new Date(clip.created_at).toLocaleString()}</span>
                                <div class="clip-actions">
                                    <button onclick="copyClip('${escapeHTML(decryptedContent.replace(/'/g, "\\'").replace(/\n/g, '\\n'))}')">Copy</button>
                                    <button class="delete" onclick="deleteClip('${clip.id}')">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.deleteClip = async (id) => {
                try {
                    const { error } = await supabaseClient
                        .from('clips')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    fetchClips();
                } catch (err) {
                    alert("Failed to delete clip: " + err.message);
                }
            };

            window.copyClip = (text) => {
                const textarea = document.createElement('textarea');
                textarea.innerHTML = text;
                navigator.clipboard.writeText(textarea.value).then(() => {
                    if (typeof window.showToast === 'function') {
                        window.showToast("Copied to clipboard!", "success");
                    }
                }).catch(() => {
                    if (typeof window.showToast === 'function') {
                        window.showToast("Failed to copy.", "error");
                    }
                });
            };

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }
        });
    </script>
</body>
</html>
