<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .dashboard-container { width: 100%; max-width: 900px; margin: 80px auto 40px auto; padding: 0 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: var(--card-bg); padding: 20px 30px; border-radius: 16px; border: 1px solid var(--card-border); box-shadow: var(--shadow-sm); }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .dashboard-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 25px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
        .dashboard-card h3 { margin-top: 0; font-size: 1.2rem; color: var(--text-primary); }
        
        textarea { width: 100%; height: 120px; padding: 15px; font-size: 1rem; border: 1px solid var(--card-border); border-radius: 8px; resize: vertical; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; background: var(--bg-color); color: var(--text-primary); transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: var(--accent-primary); }
        
        .clips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .clips-header h2 { margin: 0; font-size: 1.4rem; color: var(--text-primary); }
        
        .clips-list { display: flex; flex-direction: column; gap: 15px; }
        .clip-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; position: relative; transition: transform 0.2s, box-shadow 0.2s; }
        .clip-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .clip-content { font-size: 1rem; color: var(--text-primary); white-space: pre-wrap; word-break: break-word; margin: 0 0 15px 0; font-family: inherit; }
        .clip-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); }
        .clip-actions button { background: transparent; border: 1px solid var(--card-border); padding: 6px 12px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); font-size: 0.85rem; margin-left: 5px; transition: all 0.2s; font-weight: 500; }
        .clip-actions button:hover { background: var(--bg-color); color: var(--text-primary); }
        .clip-actions button.delete:hover { color: var(--danger); border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        
        #auth-guard { text-align: center; margin-top: 100px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--card-border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div id="auth-guard">
        <div class="spinner"></div>
        <h2>Authenticating...</h2>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <div class="header">
            <h1>Command Center <span class="badge">Premium</span></h1>
            <button class="btn btn-outline" id="logout-btn" style="width: auto; padding: 8px 16px; font-size: 0.9rem;">Log Out</button>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3>Cloud Clipboard</h3>
                <textarea id="clip-input" placeholder="Paste or type something to permanently save to your account..."></textarea>
                <button class="btn" id="save-btn">Save to Cloud</button>
            </div>
            
            <div class="dashboard-card">
                <h3 style="text-align: center;">Persistent Desk Display</h3>
                <div id="room-claim-section" style="display: none; flex: 1; display: flex; flex-direction: column; justify-content: center;">
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px; text-align: center;">Claim a custom room URL to display on your monitor.</p>
                    <input type="text" id="custom-room-input" placeholder="Room ID (e.g. OfficeMac)" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--bg-color); font-family: inherit; box-sizing: border-box; color: var(--text-primary); outline: none;">
                    <button class="btn" id="claim-room-btn" style="width: 100%;">Claim Room</button>
                </div>
                <div id="room-active-section" style="display: none; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">Leave this open on your desk monitor. The QR code never expires.</p>
                    <img id="persistent-qr" src="" alt="QR Code" style="width: 140px; height: 140px; margin-bottom: 20px; border-radius: 8px; padding: 10px; background: white; border: 1px solid var(--card-border);">
                    <a href="#" id="open-receiver-btn" target="_blank" class="btn" style="background: var(--success); border-color: var(--success); width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;">Open Display Link</a>
                </div>
            </div>
        </div>

        <div class="clips-header">
            <h2>Permanent History</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="search-input" placeholder="Search history..." style="padding: 8px 12px; border-radius: 8px; border: 1px solid var(--card-border); font-size: 0.9rem; width: 180px; background: var(--bg-color); color: var(--text-primary); outline: none;">
                <span id="clip-count" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;"></span>
            </div>
        </div>
        
        <div class="clips-list" id="clips-list">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authGuard = document.getElementById('auth-guard');
            const dashboard = document.getElementById('dashboard');
            const logoutBtn = document.getElementById('logout-btn');
            const saveBtn = document.getElementById('save-btn');
            const clipInput = document.getElementById('clip-input');
            const clipsList = document.getElementById('clips-list');
            const clipCount = document.getElementById('clip-count');
            
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            authGuard.style.display = 'block';

            try {
                const res = await fetch('/api/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Invalid token");
                const user = await res.json();
                
                if (!user.isPremium) {
                    window.location.href = 'pricing.html';
                    return;
                }

                authGuard.style.display = 'none';
                dashboard.style.display = 'block';
                fetchClips();
                fetchPersistentRoom();
            } catch (err) {
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }

            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            });

            async function fetchPersistentRoom() {
                try {
                    const roomRes = await fetch('/api/room', { headers: { 'Authorization': `Bearer ${token}` }});
                    if (roomRes.ok) {
                        const { customRoomId } = await roomRes.json();
                        const claimSection = document.getElementById('room-claim-section');
                        const activeSection = document.getElementById('room-active-section');
                        const qrImg = document.getElementById('persistent-qr');
                        const receiverBtn = document.getElementById('open-receiver-btn');
                        
                        if (customRoomId) {
                            claimSection.style.display = 'none';
                            activeSection.style.display = 'flex';
                            
                            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.origin + '/sender.html?room=' + customRoomId)}`;
                            receiverBtn.href = `receiver.html?room=${customRoomId}`;
                        } else {
                            claimSection.style.display = 'flex';
                            activeSection.style.display = 'none';
                        }
                    }
                } catch (e) {
                    console.error("Failed to load persistent room");
                }
            }

            const claimBtn = document.getElementById('claim-room-btn');
            if(claimBtn) claimBtn.addEventListener('click', async () => {
                const roomName = document.getElementById('custom-room-input').value.trim();
                if (!roomName) return alert('Room Name required.');
                
                claimBtn.disabled = true;
                claimBtn.innerText = "Claiming...";
                try {
                    const res = await fetch('/api/room/claim', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customRoomId: roomName })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to claim');
                    fetchPersistentRoom();
                } catch (err) {
                    alert(err.message);
                } finally {
                    claimBtn.disabled = false;
                    claimBtn.innerText = "Claim Room";
                }
            });

            let allClips = [];
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allClips.filter(c => c.content.toLowerCase().includes(term));
                renderClips(filtered);
            });

            async function fetchClips() {
                try {
                    const res = await fetch('/api/clips', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    allClips = await res.json();
                    renderClips(allClips);
                } catch (err) {
                    clipsList.innerHTML = '<div class="empty-state">Error loading clips.</div>';
                }
            }

            function renderClips(clips) {
                clipCount.innerText = `${clips.length} saved`;
                if (clips.length === 0) {
                    clipsList.innerHTML = '<div class="empty-state">No saved clips yet. Start typing above!</div>';
                    return;
                }

                clipsList.innerHTML = clips.map(clip => `
                    <div class="clip-card" id="clip-${clip._id}">
                        <pre class="clip-content">${escapeHTML(clip.content)}</pre>
                        <div class="clip-meta">
                            <span>${new Date(clip.createdAt).toLocaleString()}</span>
                            <div class="clip-actions">
                                <button onclick="copyClip('${escapeHTML(clip.content.replace(/'/g, "\\'").replace(/\n/g, '\\n'))}')">Copy</button>
                                <button class="delete" onclick="deleteClip('${clip._id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            saveBtn.addEventListener('click', async () => {
                const content = clipInput.value.trim();
                if (!content) return;

                saveBtn.disabled = true;
                saveBtn.innerText = "Saving...";

                try {
                    const res = await fetch('/api/clips', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ content })
                    });
                    
                    if (res.ok) {
                        clipInput.value = '';
                        fetchClips();
                    }
                } catch (err) {
                    alert("Failed to save clip.");
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Save to Cloud";
                }
            });

            window.deleteClip = async (id) => {
                try {
                    await fetch(`/api/clips/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    fetchClips();
                } catch (err) {
                    alert("Failed to delete clip.");
                }
            };

            window.copyClip = (text) => {
                const textarea = document.createElement('textarea');
                textarea.innerHTML = text;
                navigator.clipboard.writeText(textarea.value).then(() => {
                    alert("Copied to clipboard!");
                }).catch(() => {
                    alert("Failed to copy.");
                });
            };

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }
        });
    </script>
</body>
</html>
