<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DropConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .page-container { width: 100%; max-width: 800px; margin: 50px auto; padding: 0 20px; box-sizing: border-box; }
        .page-header { margin-bottom: 30px; text-align: center; }
        .page-header h1 { font-weight: 800; font-size: 2.5rem; color: var(--text-primary); margin-bottom: 10px; }
        .page-header p { color: var(--text-secondary); font-size: 1.05rem; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; box-shadow: var(--shadow-sm); }
        .contact-info { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; }
        .info-val { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px 15px; font-size: 0.95rem; background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; font-family: inherit; outline: none; }
        input:focus, textarea:focus { border-color: var(--accent-primary); }
        .btn { padding: 14px 24px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <div class="page-container">
        <div class="page-header">
            <h1>Contact Us</h1>
            <p>Have questions or need assistance? We are here to help.</p>
        </div>
        <div class="card">
            <div class="contact-info">
                <div class="info-item">
                    <span class="info-label">Merchant / Business Name</span>
                    <span class="info-val">DropConnect Technologies</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Support Email</span>
                    <span class="info-val"><a href="mailto:support@dropconnect.com" style="color: var(--accent-primary); text-decoration: none;">support@dropconnect.com</a></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Operating Hours</span>
                    <span class="info-val">Monday – Friday: 9:00 AM – 6:00 PM IST</span>
                </div>
            </div>
            <form onsubmit="event.preventDefault(); alert('Thank you for your message! Our team will get back to you shortly.'); this.reset();">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Your Email</label>
                    <input type="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="4" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
