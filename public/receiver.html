<html lang="en">

    <meta charset="UTF-8">

    <meta name="keywords" content="receive files, desktop display, DropConnect receiver">

    <meta property="og:title" content="Receive Files - DropConnect">
    <meta property="og:description" content="Display this DropConnect screen on your desktop to instantly receive files, links, and text from your other devices.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/receiver">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Receive Files - DropConnect">
    <meta name="twitter:description" content="Display this DropConnect screen on your desktop to instantly receive files, links, and text from your other devices.">
    <script src="socket.io.min.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="crypto-js.min.js"></script>
    <script src="vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .qr-wrapper { position: relative; background: #ffffff; padding: 15px; border-radius: 12px; display: inline-block; border: 1px solid var(--card-border); margin-bottom: 20px; align-self: center; }
        #qrcode { display: block; border-radius: 4px; width: 180px; height: 180px; background: #ffffff; }
        .status-box { background: var(--bg-color); padding: 16px; border-radius: 8px; border: 1px solid var(--card-border); position: relative; overflow: hidden; min-height: 24px; margin-bottom: 15px; }
        #status { color: var(--text-secondary); font-weight: 600; font-size: 0.95rem; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #status.success { color: var(--success); }
        .loader { border: 2px solid rgba(0,0,0,0.1); border-left-color: var(--accent-primary); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer-bar-container { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: var(--accent-primary); transform-origin: left; }
        @keyframes countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .received-items { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; padding-right: 5px; max-height: 250px; }
        .received-card { background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; text-align: left; }
        .received-content { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 15px; color: var(--text-primary); font-weight: 500; font-size: 0.95rem; }
    </style>
</head>
<body>
    

    <div class="container" style="margin-top: 40px; padding: 0;">
        <div class="card" style="display: flex; flex-direction: column; max-height: 80vh;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px;">
                <h2 style="margin: 0; font-size: 1.4rem;">Desk Display</h2>
                <div style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(16, 185, 129, 0.3); display: flex; align-items: center; gap: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2EE
                </div>
            </div>
            <p class="subtitle" style="margin-bottom: 20px;">Scan the QR code with your phone to establish a secure connection.</p>
            
            <div class="qr-wrapper">
                <div id="qrcode" style="display: flex; justify-content: center; align-items: center; background: white;"></div>
                <div class="timer-bar-container">
                    <div class="timer-bar" id="timerBar"></div>
                </div>
            </div>
            
            <div class="status-box">
                <p id="status"><span class="loader" id="loader"></span> Waiting for connection...</p>
            </div>

            <div class="received-items" id="receivedItems">
                <div id="emptyState" style="color: var(--text-secondary); text-align: center; margin-top: 30px; font-style: italic; animation: slideIn 0.5s ease;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px; opacity: 0.3;">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg><br/>
                    No items received yet.<br/>Scan the QR code to start!
                </div>
            </div>
            
            <div class="ad-banner" id="receiver-ad-banner" style="margin-top: 20px; width: 100%; height: 50px; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.8rem; border: 1px solid var(--card-border); padding: 10px; box-sizing: border-box; text-align: center; flex-shrink: 0;">
                <div style="font-weight: 700; color: var(--accent-primary); font-size: 0.85rem;">🔒 Fully Encrypted Transfer</div>
                <div style="font-size: 0.75rem; color: var(--text-secondary);">End-to-End Encrypted using client-side AES.</div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        if (typeof io !== 'undefined') {
            const socketUrl = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                ? '' 
                : 'https://dropconnect.up.railway.app';
            socket = io(socketUrl);
        } else {
            console.error("Socket.io library not loaded.");
        }
        const statusEl = document.getElementById('status');
        const receivedItemsEl = document.getElementById('receivedItems');
        const timerBar = document.getElementById('timerBar');

        let encryptionKey = '';
        const urlParams = new URLSearchParams(window.location.search);
        const persistentRoomId = urlParams.get('room');

        if (persistentRoomId) {
            // It's a Premium Custom Room. Use the room ID as the encryption key
            encryptionKey = persistentRoomId;
            
            // Hide Ads for Custom Rooms (Premium only)
            const adBanner = document.getElementById('receiver-ad-banner');
            if (adBanner) adBanner.style.display = 'none';
        }

        if (socket) {
            socket.on('session-expired', () => {
                alert("Free session expired (10 minutes max). Please refresh for a new session or upgrade to Premium.");
                window.location.reload();
            });
        }

        function refreshQRCode() {
            if (persistentRoomId) {
                // Persistent Premium Room
                const currentUrl = window.location.origin;
                const senderUrl = `${currentUrl}/sender?room=${persistentRoomId}`;
                
                const qrcodeContainer = document.getElementById('qrcode');
                qrcodeContainer.innerHTML = '';
                if (typeof QRCode !== 'undefined') {
                    new QRCode(qrcodeContainer, {
                        text: senderUrl,
                        width: 180,
                        height: 180,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                } else {
                    qrcodeContainer.innerHTML = '<div style="color: var(--danger); font-size: 0.8rem; text-align: center;">QR Error</div>';
                }
                
                if (socket) {
                    socket.emit('join-room', persistentRoomId);
                }
                
                document.querySelector('.timer-bar-container').style.display = 'none';
                return; // Stop here, no timer needed
            }

            const newSessionId = Math.random().toString(36).substring(2, 10);
            encryptionKey = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            const currentUrl = window.location.origin;
            const senderUrl = `${currentUrl}/sender?room=${newSessionId}#key=${encryptionKey}`;

            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';
            if (typeof QRCode !== 'undefined') {
                new QRCode(qrcodeContainer, {
                    text: senderUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            } else {
                qrcodeContainer.innerHTML = '<div style="color: var(--danger); font-size: 0.8rem; text-align: center;">QR Error</div>';
            }
            
            if (socket) {
                socket.emit('join-room', newSessionId);
            }

            timerBar.style.animation = 'none';
            timerBar.offsetHeight; 
            timerBar.style.animation = 'countdown 30s linear forwards';
        }

        refreshQRCode();

        if (!persistentRoomId) {
            setInterval(refreshQRCode, 30000);
        }

        function showSuccess(message) {
            statusEl.className = 'success';
            statusEl.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                ${message}
            `;
            setTimeout(() => {
                statusEl.className = '';
                statusEl.innerHTML = '<span class="loader" id="loader"></span> Waiting for more...';
            }, 3000);
        }

        if (socket) {
            socket.on('receive-data', async (data) => {
            if (!encryptionKey) {
                showSuccess("Awaiting PIN entry...");
                return;
            }
            
            try {
                const bytes = CryptoJS.AES.decrypt(data.content, encryptionKey);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!originalText) throw new Error('Decryption resulted in empty string');
                data.content = originalText;
            } catch (err) {
                console.error("Decryption failed:", err);
                showSuccess("Decryption Failed! Bad PIN/Key.");
                return;
            }

            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'received-card';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'received-content';
            contentDiv.textContent = data.content;
            
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.width = 'auto';
            btn.style.padding = '8px 14px';
            btn.style.fontSize = '0.85rem';
            
            if (data.type === 'url') {
                showSuccess("URL Received!");
                btn.textContent = 'Open Link';
                btn.onclick = () => window.open(data.content, '_blank');
            } else {
                showSuccess("Text Received!");
                btn.textContent = 'Copy Text';
                
                btn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(data.content);
                        btn.textContent = 'Copied!';
                        btn.style.background = 'var(--success)';
                        setTimeout(() => {
                            btn.textContent = 'Copy Text';
                            btn.style.background = '';
                        }, 2000);
                    } catch(e) {
                        alert("Failed to copy text. Please try again.");
                    }
                };
            }
            
            card.appendChild(contentDiv);
            card.appendChild(btn);
            
            receivedItemsEl.insertBefore(card, receivedItemsEl.firstChild);
        });
        }

        // Only initialize VanillaTilt on desktop (pointer: fine) devices
        if (window.matchMedia('(pointer: fine)').matches && typeof VanillaTilt !== 'undefined') {
            VanillaTilt.init(document.querySelectorAll(".card"), {
                max: 2,
                speed: 400,
                glare: true,
                "max-glare": 0.1
            });
        }
    </script>
</body>
</html>
