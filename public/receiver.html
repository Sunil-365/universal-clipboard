<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiver Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 450px; height: 450px; background: #c4b5fd; top: 0%; left: 0%; }
        .orb-2 { width: 550px; height: 550px; background: #fbcfe8; bottom: 0%; right: 0%; animation-delay: -10s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--card-border);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.4);
            max-width: 450px;
            width: 90%;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        h2 {
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .qr-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 1);
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 20px;
            align-self: center;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
            to { box-shadow: 0 0 50px rgba(236, 72, 153, 0.4); }
        }

        .qr-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        #qrcode {
            display: block;
            border-radius: 8px;
            width: 180px;
            height: 180px;
            background: #ffffff;
            padding: 10px;
        }

        .status-box {
            background: rgba(255,255,255,0.7);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
            min-height: 24px;
            margin-bottom: 15px;
        }

        #status {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: color 0.3s ease;
        }

        #status.success {
            color: var(--success);
        }

        .loader {
            border: 2px solid rgba(0,0,0,0.1);
            border-left-color: var(--accent-primary);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timer-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transform-origin: left;
        }

        @keyframes countdown {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .received-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .received-items::-webkit-scrollbar {
            width: 6px;
        }
        .received-items::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 3px;
        }

        .received-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .received-content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 15px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .action-btn {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 100%;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
        <div class="header">
            <a href="/" class="back-btn" title="Back to Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <h2 style="margin: 0; font-size: 1.4rem;">Connect Device</h2>
                <div style="background: rgba(52, 211, 153, 0.2); color: var(--success); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--success); display: flex; align-items: center; gap: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2EE
                </div>
            </div>
            <div style="width: 44px; height: 40px;"></div>
        </div>
        <p class="subtitle">Scan the QR code with your phone to establish a secure connection.</p>
        
        <div class="qr-wrapper">
            <img id="qrcode" src="" alt="Loading QR..." />
            <div class="timer-bar-container">
                <div class="timer-bar" id="timerBar"></div>
            </div>
        </div>
        
        <div class="status-box">
            <p id="status"><span class="loader" id="loader"></span> Waiting for connection...</p>
        </div>

        <div class="received-items" id="receivedItems">
            <div id="emptyState" style="color: var(--text-secondary); text-align: center; margin-top: 30px; font-style: italic; animation: slideIn 0.5s ease;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px; opacity: 0.3;">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg><br/>
                No items received yet.<br/>Scan the QR code to start!
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const statusEl = document.getElementById('status');
        const loaderEl = document.getElementById('loader');
        const receivedItemsEl = document.getElementById('receivedItems');
        const timerBar = document.getElementById('timerBar');

        let encryptionKey = '';

        function refreshQRCode() {
            // 1. Generate a new random session ID and Encryption Key
            const newSessionId = Math.random().toString(36).substring(2, 10);
            encryptionKey = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);

            // 2. Create the URL that Device 2 will visit (Key stays in hash fragment so server never sees it)
            const currentUrl = window.location.origin;
            const senderUrl = `${currentUrl}/sender.html?room=${newSessionId}#key=${encryptionKey}`;

            // 3. Display the new QR code
            document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(senderUrl)}`;

            // 4. Join the new WebSocket room
            // We purposely don't leave old rooms. If someone scanned a code at the 29th second, 
            // we still want them to be able to send messages without getting suddenly disconnected!
            socket.emit('join-room', newSessionId);

            // 5. Reset the visual timer bar
            timerBar.style.animation = 'none';
            timerBar.offsetHeight; /* trigger reflow */
            timerBar.style.animation = 'countdown 30s linear forwards';
        }

        // Initialize the first QR code
        refreshQRCode();

        // Refresh the QR code every 30 seconds
        setInterval(refreshQRCode, 30000);

        function showSuccess(message) {
            statusEl.className = 'success';
            statusEl.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                ${message}
            `;
            setTimeout(() => {
                statusEl.className = '';
                statusEl.innerHTML = '<span class="loader" id="loader"></span> Waiting for more...';
            }, 3000);
        }

        // 5. Listen for incoming data from Device 2
        socket.on('receive-data', async (data) => {
            // DECRYPT THE DATA FIRST!
            try {
                const bytes = CryptoJS.AES.decrypt(data.content, encryptionKey);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!originalText) throw new Error('Decryption resulted in empty string');
                data.content = originalText;
            } catch (err) {
                console.error("Decryption failed:", err);
                showSuccess("Decryption Failed! Bad Key.");
                return;
            }

            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'received-card';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'received-content';
            contentDiv.textContent = data.content;
            
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            
            if (data.type === 'url') {
                showSuccess("URL Received!");
                btn.textContent = 'Open Link';
                btn.onclick = () => window.open(data.content, '_blank');
                
                // Still try to auto-open, but browser popup blockers usually block this
                const newWindow = window.open(data.content, '_blank');
                if(!newWindow || newWindow.closed || typeof newWindow.closed=='undefined') {
                    console.log("Auto-popup blocked by browser.");
                }
            } else {
                showSuccess("Text Received!");
                btn.textContent = 'Copy Text';
                
                btn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(data.content);
                        btn.textContent = 'Copied!';
                        btn.style.background = 'var(--success)';
                        setTimeout(() => {
                            btn.textContent = 'Copy Text';
                            btn.style.background = 'linear-gradient(90deg, var(--accent-primary), var(--accent-secondary))';
                        }, 2000);
                    } catch(e) {
                        alert("Failed to copy text. Please try again.");
                    }
                };
                
                // Still try auto-copy (might be blocked without user gesture)
                try {
                    await navigator.clipboard.writeText(data.content);
                    btn.textContent = 'Copied!';
                    btn.style.background = 'var(--success)';
                } catch (err) {
                    console.log('Auto-copy blocked by browser due to lack of user interaction.');
                }
            }
            
            card.appendChild(contentDiv);
            card.appendChild(btn);
            
            // Add to top of list
            receivedItemsEl.insertBefore(card, receivedItemsEl.firstChild);
        });
    </script>
</body>
</html>
