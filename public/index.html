<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-RSVYPTE9QZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clipboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --receive-primary: #34d399;
            --receive-secondary: #059669;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--accent-primary); top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent-secondary); bottom: 10%; right: 10%; animation-delay: -10s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        h1 {
            font-weight: 800;
            font-size: 4rem;
            margin-bottom: 15px;
            text-align: center;
            background: linear-gradient(to right, var(--accent-primary), #e879f9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            letter-spacing: -1.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.15rem;
            margin-bottom: 60px;
            text-align: center;
            max-width: 500px;
        }

        .cards-container {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            transition: opacity 0.3s ease;
            opacity: 0.7;
        }

        .card.send::before {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        .card.receive::before {
            background: linear-gradient(90deg, var(--receive-primary), var(--receive-secondary));
        }

        .card:hover {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.7);
        }

        .card.send:hover {
            border-color: rgba(56, 189, 248, 0.4);
        }

        .card.receive:hover {
            border-color: rgba(52, 211, 153, 0.4);
        }

        .card:active {
            transform: translateY(-5px);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .card.send .icon-wrapper {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
        }

        .card.receive .icon-wrapper {
            background: rgba(52, 211, 153, 0.1);
            color: var(--receive-primary);
        }

        h2 {
            font-size: 1.8rem;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p.desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <h1>Clipboard</h1>
    <p class="subtitle">Seamlessly share text and links across all your devices instantly.</p>
    
    <div class="cards-container">
        <a href="sender.html" class="card send" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
            <div class="icon-wrapper">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </div>
            <h2>Send</h2>
            <p class="desc">Send text or scan QR codes from this device to a receiver.</p>
        </a>

        <a href="receiver.html" class="card receive" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
            <div class="icon-wrapper">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <h2>Receive</h2>
            <p class="desc">Display a QR code to connect and receive data on this device.</p>
        </a>
    </div>
    
    <a href="feedback.html" style="margin-top: 40px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: color 0.2s;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Leave Anonymous Feedback
    </a>
</body>
</html>
