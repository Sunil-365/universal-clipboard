<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RSVYPTE9QZ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clipboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .cards-container {
            display: flex; gap: 25px; width: 100%; max-width: 800px; justify-content: center; flex-wrap: wrap; margin-top: 20px;
        }
        .action-card {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px 30px; text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); flex: 1; min-width: 280px; max-width: 350px; cursor: pointer; text-decoration: none;
            color: var(--text-primary); transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden;
        }
        .action-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .action-card.send::before { background: var(--accent-primary); }
        .action-card.receive::before { background: var(--success); }
        .action-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .action-card.send:hover { border-color: var(--accent-primary); }
        .action-card.receive:hover { border-color: var(--success); }
        
        .icon-wrapper { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .action-card.send .icon-wrapper { background: #e0e7ff; color: var(--accent-primary); }
        .action-card.receive .icon-wrapper { background: #d1fae5; color: var(--success); }
        body.dark-theme .action-card.send .icon-wrapper { background: rgba(79, 70, 229, 0.2); }
        body.dark-theme .action-card.receive .icon-wrapper { background: rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    
    <div class="container-wide" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; margin-top: 40px;">
        <h1 style="font-size: 3.5rem;">DropConnect</h1>
        <p class="subtitle" style="font-size: 1.1rem; max-width: 500px;">Seamlessly share text and links across all your devices instantly. No setup required.</p>
        
        <div class="cards-container">
            <a href="receiver" class="action-card receive" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
                <div class="icon-wrapper">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                </div>
                <h2>Desk Display</h2>
                <p class="desc" style="color: var(--text-secondary); line-height: 1.5;">I am on my computer. Generate a QR code to receive data.</p>
            </a>

            <a href="sender" class="action-card send" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
                <div class="icon-wrapper">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                    </svg>
                </div>
                <h2>Mobile Sender</h2>
                <p class="desc" style="color: var(--text-secondary); line-height: 1.5;">I am on my phone. Scan a Desk Display to send data.</p>
            </a>
        </div>
        
        <div class="ad-banner" id="index-ad-banner" style="margin-top: 40px; width: 100%; max-width: 800px; height: 90px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-secondary); font-size: 0.9rem; border: 1px dashed var(--card-border);">
            Ad Placement Placeholder
        </div>

        <a href="feedback" class="btn-outline" style="margin-top: 40px; text-decoration: none; display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-weight: 500; font-size: 0.95rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Leave Anonymous Feedback
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                const adBanner = document.getElementById('index-ad-banner');
                if (adBanner) adBanner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
