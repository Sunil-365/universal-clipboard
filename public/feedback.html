<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="google-adsense-account" content="ca-pub-4223443909078451">

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RSVYPTE9QZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Anonymous Feedback - DropConnect</title>
    <meta name="description" content="Leave anonymous feedback for DropConnect to help us improve the file sharing experience.">
    <meta name="keywords" content="DropConnect feedback, anonymous feedback, suggestions">
    <link rel="canonical" href="https://dropconnect.up.railway.app/feedback">
    <meta property="og:title" content="Anonymous Feedback - DropConnect">
    <meta property="og:description" content="Leave anonymous feedback for DropConnect to help us improve the file sharing experience.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dropconnect.up.railway.app/feedback">
    <meta property="og:image" content="https://dropconnect.up.railway.app/favicon.svg">
    <meta property="og:site_name" content="DropConnect">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Anonymous Feedback - DropConnect">
    <meta name="twitter:description" content="Leave anonymous feedback for DropConnect to help us improve the file sharing experience.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="supabase-js.js"></script>
    <script src="supabase-config.js"></script>
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .page-wrapper {
            width: 100%;
            max-width: 850px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
        }

        .header-title {
            margin-bottom: 24px;
        }

        .header-title h1 {
            font-weight: 800;
            font-size: 2.2rem;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.8px;
        }

        .feedback-card {
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-glass);
            margin-bottom: 36px;
        }

        textarea {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            min-height: 140px;
            resize: vertical;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .reviews-header {
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .review-card {
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .review-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .review-badge {
            background: var(--success-bg);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .review-content {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-style: italic;
        }

        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skeleton {
            background: var(--card-border);
            border-radius: 4px;
            opacity: 0.5;
        }
        
        .skeleton-line { height: 14px; width: 100%; }
        .skeleton-line.short { width: 40%; }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div class="page-wrapper">
        <div class="header-title">
            <h1>Anonymous Feedback</h1>
        </div>

        <div class="feedback-card">
            <textarea id="feedbackText" placeholder="Share your anonymous thoughts, feature requests, or bug reports..." maxlength="500"></textarea>
            <div id="charCount" style="text-align: right; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; margin-top: -4px;">0 / 500</div>
            <button id="submitBtn" class="submit-btn" onclick="submitFeedback()">Submit Anonymously</button>
        </div>

        <div class="reviews-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Recent Community Feedback
        </div>
        
        <div class="reviews-list" id="reviewsList">
            <div class="skeleton-card">
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line"></div>
            </div>
        </div>
    </div>

    <script>
        const reviewsList = document.getElementById('reviewsList');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackText = document.getElementById('feedbackText');
        const charCount = document.getElementById('charCount');

        feedbackText.addEventListener('input', () => {
            charCount.textContent = `${feedbackText.value.length} / 500`;
        });

        async function loadReviews() {
            try {
                if (typeof supabaseClient === 'undefined') {
                    reviewsList.innerHTML = `<div class="empty-state">Database config missing.</div>`;
                    return;
                }
                
                const { data, error } = await supabaseClient
                    .from('reviews')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                renderReviews(data || []);
            } catch (err) {
                console.error("Failed to load reviews", err);
                reviewsList.innerHTML = `<div class="empty-state">Failed to load feedback.</div>`;
            }
        }

        function renderReviews(reviews) {
            if (reviews.length === 0) {
                reviewsList.innerHTML = `<div class="empty-state">No feedback yet. Be the first!</div>`;
                return;
            }

            reviewsList.innerHTML = '';
            reviews.forEach(review => {
                const card = createReviewCard(review);
                reviewsList.appendChild(card);
            });
        }

        function createReviewCard(review) {
            const div = document.createElement('div');
            div.className = 'review-card';
            
            const date = new Date(review.created_at || review.date);
            const formattedDate = date.toLocaleDateString(undefined, { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });

            div.innerHTML = `
                <div class="review-meta">
                    <span class="review-badge">Anonymous</span>
                    <span>${formattedDate}</span>
                </div>
                <div class="review-content">${escapeHTML(review.content)}</div>
            `;
            return div;
        }

        async function submitFeedback() {
            const content = feedbackText.value.trim();
            if (!content) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                if (typeof supabaseClient === 'undefined') {
                    throw new Error("Supabase is not configured.");
                }

                const { data: newReview, error } = await supabaseClient
                    .from('reviews')
                    .insert([{ content: content }])
                    .select()
                    .single();

                if (error) throw error;

                if (reviewsList.querySelector('.empty-state')) {
                    reviewsList.innerHTML = '';
                }

                const card = createReviewCard(newReview);
                reviewsList.insertBefore(card, reviewsList.firstChild);

                feedbackText.value = '';
                charCount.textContent = '0 / 500';
                
                submitBtn.textContent = 'Submitted!';
                submitBtn.style.background = 'var(--success)';
                if (typeof window.showToast === 'function') {
                    window.showToast("Feedback submitted anonymously!", "success");
                }
                
                setTimeout(() => {
                    submitBtn.textContent = 'Submit Anonymously';
                    submitBtn.style.background = '';
                    submitBtn.disabled = false;
                }, 2000);
            } catch (err) {
                alert("Failed to submit feedback: " + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Anonymously';
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        loadReviews();
    </script>
</body>
</html>
