<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVYPTE9QZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RSVYPTE9QZ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Feedback - DropConnect</title>
    <meta name="description" content="Leave anonymous feedback for DropConnect to help us improve the file sharing experience.">
    <meta name="keywords" content="DropConnect feedback, anonymous feedback, suggestions">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <script src="navbar.js"></script>
    <style>
        .page-wrapper {
            width: 100%;
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header-title h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .feedback-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 35px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 18px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            min-height: 140px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
            transition: border-color 0.2s, background-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reviews-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .review-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .review-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .review-badge {
            background: rgba(79, 70, 229, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
        }

        .review-content {
            font-size: 1.05rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-style: italic;
        }

        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .skeleton {
            background: var(--card-border);
            border-radius: 4px;
            opacity: 0.6;
        }
        
        .skeleton-line { height: 16px; width: 100%; }
        .skeleton-line.short { width: 40%; }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div class="page-wrapper">
        <div class="header-title">
            <h1>Anonymous Feedback</h1>
        </div>

        <div class="feedback-card">
            <textarea id="feedbackText" placeholder="Share your anonymous thoughts, feature requests, or bug reports..." maxlength="500"></textarea>
            <div id="charCount" style="text-align: right; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 15px; margin-top: -5px;">0 / 500</div>
            <button id="submitBtn" class="submit-btn" onclick="submitFeedback()">Submit Anonymously</button>
        </div>

        <div class="reviews-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Recent Feedback
        </div>
        
        <div class="reviews-list" id="reviewsList">
            <div class="skeleton-card">
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/reviews';
        const reviewsList = document.getElementById('reviewsList');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackText = document.getElementById('feedbackText');
        const charCount = document.getElementById('charCount');

        feedbackText.addEventListener('input', () => {
            charCount.textContent = `${feedbackText.value.length} / 500`;
        });

        // Fetch and display reviews on load
        async function loadReviews() {
            try {
                const res = await fetch(API_URL);
                const reviews = await res.json();
                renderReviews(reviews);
            } catch (err) {
                console.error("Failed to load reviews", err);
                reviewsList.innerHTML = `<div class="empty-state">Failed to load feedback.</div>`;
            }
        }

        function renderReviews(reviews) {
            if (reviews.length === 0) {
                reviewsList.innerHTML = `<div class="empty-state">No feedback yet. Be the first!</div>`;
                return;
            }

            reviewsList.innerHTML = '';
            reviews.forEach(review => {
                const card = createReviewCard(review);
                reviewsList.appendChild(card);
            });
        }

        function createReviewCard(review) {
            const div = document.createElement('div');
            div.className = 'review-card';
            
            // Format date nicely
            const date = new Date(review.date);
            const formattedDate = date.toLocaleDateString(undefined, { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });

            div.innerHTML = `
                <div class="review-meta">
                    <span class="review-badge">Anonymous</span>
                    <span>${formattedDate}</span>
                </div>
                <div class="review-content">${escapeHTML(review.content)}</div>
            `;
            return div;
        }

        async function submitFeedback() {
            const content = feedbackText.value.trim();
            if (!content) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                if (res.ok) {
                    const newReview = await res.json();
                    
                    // Remove empty state if present
                    if (reviewsList.querySelector('.empty-state')) {
                        reviewsList.innerHTML = '';
                    }

                    // Prepend new review
                    const card = createReviewCard(newReview);
                    reviewsList.insertBefore(card, reviewsList.firstChild);

                    // Reset form
                    feedbackText.value = '';
                    charCount.textContent = '0 / 500';
                    
                    // Show success
                    submitBtn.textContent = 'Submitted!';
                    submitBtn.style.background = 'var(--success)';
                    
                    setTimeout(() => {
                        submitBtn.textContent = 'Submit Anonymously';
                        submitBtn.style.background = '';
                        submitBtn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error("Server error");
                }
            } catch (err) {
                alert("Failed to submit feedback. Please try again.");
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Anonymously';
            }
        }

        // Basic XSS prevention
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Load initially
        loadReviews();
    </script>
</body>
</html>
